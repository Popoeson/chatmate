<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Room</title>
  <link rel="stylesheet" href="styles.css"> <!-- your existing CSS -->
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    /* Dark-themed chat styles (inline backup if styles.css missing anything) */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 2rem auto;
      height: 80vh;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(90deg, #1a1a1a, #222);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .chat-header {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: #1f1f1f;
      border-bottom: 1px solid #333;
    }

    .chat-header .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 1rem;
      border: 2px solid #4caf50;
    }

    #friend-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #4caf50;
    }

    .chat-messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      background: #111;
    }

    .chat-message {
      margin-bottom: 0.8rem;
      padding: 0.6rem 1rem;
      border-radius: 20px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .chat-message.outgoing {
      background: #4caf50;
      color: #111;
      margin-left: auto;
      text-align: right;
    }

    .chat-message.incoming {
      background: #333;
      color: #fff;
      margin-right: auto;
    }

    #chat-form {
      display: flex;
      border-top: 1px solid #333;
      background: #1f1f1f;
    }

    #message-input {
      flex: 1;
      padding: 0.8rem 1rem;
      border: none;
      outline: none;
      background: #111;
      color: #fff;
      font-size: 1rem;
    }

    #chat-form button {
      padding: 0 1.5rem;
      border: none;
      background: #4caf50;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    #chat-form button:hover {
      background: #43a047;
    }

  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header" id="chat-header">
      <img id="friend-avatar" src="default-avatar.png" alt="Avatar" class="avatar">
      <span id="friend-name">Friend</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <form id="chat-form">
      <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const API_BASE = "https://your-backend-url.com"; // update with your backend URL
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first.");
      window.location.href = "login.html";
    }

    const params = new URLSearchParams(window.location.search);
    const friendId = params.get("friendId");
    const friendNameFromParams = params.get("friendName");

    if (!friendId) {
      alert("No friend selected.");
      window.location.href = "friends.html";
    }

    const friendNameElem = document.getElementById("friend-name");
    const friendAvatarElem = document.getElementById("friend-avatar");
    const chatMessagesElem = document.getElementById("chat-messages");
    const chatForm = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");

    async function fetchFriendInfo() {
      try {
        const res = await fetch(`${API_BASE}/users/${friendId}`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (!res.ok) throw new Error("Failed to fetch friend info");
        const data = await res.json();
        friendNameElem.textContent = data.username || friendNameFromParams || "Friend";
        friendAvatarElem.src = data.avatarUrl || "default-avatar.png";
      } catch (err) {
        console.error(err);
        friendNameElem.textContent = friendNameFromParams || "Friend";
      }
    }

    fetchFriendInfo();

    const socket = io(API_BASE, { auth: { token } });

    socket.on("connect", () => console.log("Connected to chat server"));

    socket.on("message_received", data => {
      if (data.from === friendId) appendMessage(data.message, false);
    });

    chatForm.addEventListener("submit", e => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;
      socket.emit("send_message", { to: friendId, message });
      appendMessage(message, true);
      messageInput.value = "";
    });

    function appendMessage(message, outgoing) {
      const msgDiv = document.createElement("div");
      msgDiv.className = outgoing ? "chat-message outgoing" : "chat-message incoming";
      msgDiv.textContent = message;
      chatMessagesElem.appendChild(msgDiv);
      chatMessagesElem.scrollTop = chatMessagesElem.scrollHeight;
    }
  </script>
</body>
</html>
