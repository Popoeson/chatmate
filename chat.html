<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<!-- ✅ VERY IMPORTANT FOR RESPONSIVENESS -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ✅ FIXED ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<style>
/* ========================= GLOBAL FIX ========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ========================= THEME ========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --subtle: #888;
  --input-border: #ddd;
  --primary: #1C1C1E;
  --white: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --subtle: #aaa;
  --input-border: #444;
  --primary: #fff;
  --white: #2C2C2E;
}

/* ========================= BODY ========================= */
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  justify-content: center;

  /* Subtle side background for large screens */
  background-image: linear-gradient(to right, #e8e8e8 0%, var(--bg) 20%, var(--bg) 80%, #e8e8e8 100%);
}

body.dark {
  background-image: linear-gradient(to right, #000 0%, var(--bg) 20%, var(--bg) 80%, #000 100%);
}

/* ========================= WRAPPER ========================= */
.chat-wrapper {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative; /* ← key fix for input positioning */

  /* Border on large screens to define the chat column */
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
}

/* ========================= HEADER ========================= */
.chat-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  border-bottom: 1px solid rgba(0,0,0,0.05);
  z-index: 5;
}

body.dark .chat-header {
  background: rgba(0,0,0,0.3);
}

.chat-header img {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
}

.chat-header span {
  font-weight: 600;
  font-size: 15px;
  flex: 1;
}

/* ========================= MESSAGES ========================= */
.messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px;
  padding-bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ========================= MESSAGE BUBBLE ========================= */
.msg {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.4;
  word-wrap: break-word;
  display: flex;
  flex-direction: column;
}

.me {
  align-self: flex-end;
  background: var(--primary);
  color: var(--bg);
  border-bottom-right-radius: 4px;
}

.them {
  align-self: flex-start;
  background: var(--white);
  border-bottom-left-radius: 4px;
}

body.dark .them {
  background: #2C2C2E;
}

.msg-time {
  font-size: 10px;
  opacity: 0.5;
  margin-top: 4px;
  align-self: flex-end;
}

/* ========================= INPUT ========================= */
.chat-input {
  /* Positioned relative to wrapper, not viewport */
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;         /* ← stretches to wrapper width only */
  z-index: 10;

  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 8px 12px;

  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.85);
  border-top: 1px solid rgba(0,0,0,0.07);
}

body.dark .chat-input {
  background: rgba(28,28,30,0.85);
}

/* ========================= TEXTAREA ========================= */
.chat-input textarea {
  flex: 1;
  padding: 10px 12px;
  border-radius: 20px;
  border: 1px solid var(--input-border);
  background: var(--bg);
  color: var(--text);
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.2px;
  min-height: 28px;
  max-height: 80px;
  line-height: 1.4;
  overflow-y: auto;
  resize: none;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* ========================= SEND BUTTON ========================= */
.chat-input button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s;
}

.chat-input button:active { opacity: 0.7; }

.chat-input button i {
  font-size: 16px;
  color: inherit;
}

/* ========================= LARGE SCREEN ========================= */
@media (min-width: 500px) {
  body {
    background-color: #e5e5e5;
  }
  body.dark {
    background-color: #000;
  }
}

/* ========================= MOBILE ========================= */
@media (max-width: 480px) {
  .msg {
    max-width: 85%;
    font-size: 13px;
  }
  .chat-input textarea {
    font-size: 13px;
    padding: 8px 10px;
  }
  .chat-input button {
    width: 38px;
    height: 38px;
  }
}
</style>

</head>

<body>

<div class="chat-wrapper">

  <!-- HEADER -->
  <div class="chat-header">
    <img id="chatAvatar" />
    <span id="chatUsername">Loading...</span>
    <i id="themeToggle" class="fa-solid fa-moon"></i>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="messages"></div>

  <!-- INPUT -->
  <div class="chat-input">
    <textarea id="messageInput" placeholder="Type message..."></textarea>
    <button id="sendBtn">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>

</div>

<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

const token = Auth.getToken();
if (!token) { window.location.href = "login.html"; }

const params     = new URLSearchParams(window.location.search);
const receiverId = params.get("userId");
if (!receiverId) { window.location.href = "friends.html"; }

// ── ELEMENTS ──────────────────────────────────────────────
const messagesDiv  = document.getElementById("messages");
const input        = document.getElementById("messageInput");
const sendBtn      = document.getElementById("sendBtn");
const chatAvatar   = document.getElementById("chatAvatar");
const chatUsername = document.getElementById("chatUsername");
const toggle       = document.getElementById("themeToggle");

// ── THEME ─────────────────────────────────────────────────
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  toggle.classList.toggle("fa-sun");
  toggle.classList.toggle("fa-moon");
};

// ── STATE ─────────────────────────────────────────────────
let currentUserId = null;

// ── LOAD CURRENT USER ─────────────────────────────────────
async function loadUser() {
  const res = await fetch(`${API}/me`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) { Auth.clearToken(); window.location.href = "login.html"; return; }
  const data = await res.json();
  currentUserId = data.user._id;
}

// ── LOAD RECEIVER ─────────────────────────────────────────
async function loadReceiver() {
  const res = await fetch(`${API}/users/${receiverId}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) return;
  const user = await res.json();
  chatUsername.textContent = user.username;
  chatAvatar.src = user.avatarUrl || "";
}

// ── LOAD CHAT HISTORY ─────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${API}/messages/${receiverId}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) return;

    const { messages } = await res.json();
    messages.forEach(msg => {
      const type = msg.sender.toString() === currentUserId.toString() ? "me" : "them";
      addMessage(msg.text, type, msg.createdAt);
    });

  } catch (err) {
    console.error("History load error:", err);
  }
}

// ── SOCKET ────────────────────────────────────────────────
const socket = io("https://chatmate-kbwz.onrender.com", { auth: { token } });

// ── INCOMING MESSAGE ──────────────────────────────────────
socket.on("receive_message", (data) => {
  if (data.from?.toString() === receiverId?.toString()) {
    addMessage(data.message, "them", data.timestamp);
  }
});

// ── SEND ──────────────────────────────────────────────────
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  socket.emit("send_message", { to: receiverId, message: text });
  addMessage(text, "me", new Date());

  input.value = "";
  input.style.height = "auto";
}

sendBtn.onclick = sendMessage;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── AUTO-GROW TEXTAREA ────────────────────────────────────
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
});

// ── RENDER MESSAGE ────────────────────────────────────────
function addMessage(text, type, timestamp) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;

  const time = timestamp
    ? new Date(timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    : "";

  div.innerHTML = `
    <span class="msg-text">${escapeHTML(text)}</span>
    <span class="msg-time">${time}</span>
  `;

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ── SAFETY ────────────────────────────────────────────────
function escapeHTML(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── INIT ──────────────────────────────────────────────────
await loadUser();
await loadReceiver();

// Register only after userId is known
socket.on("connect", () => {
  if (currentUserId) socket.emit("register", currentUserId);
});

if (socket.connected) {
  socket.emit("register", currentUserId);
} else {
  socket.connect();
}

await loadHistory();

</script>

</body>
</html>
