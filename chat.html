<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://kit.fontawesome.com/your-kit.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #F8F7F4;
      --text: #1C1C1E;
      --input-border: #ccc;
      --btn-bg: #1C1C1E;
      --btn-text: #fff;
    }

    body.dark {
      --bg: #1C1C1E;
      --text: #fff;
      --input-bg: #2C2C2E;
      --btn-bg: #fff;
      --btn-text: #1C1C1E;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ========================= HEADER ========================= */
    .chat-header {
      flex-shrink: 0;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--input-border);
    }

    .chat-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    /* ========================= MESSAGES ========================= */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      word-wrap: break-word;
    }

    .me {
      align-self: flex-end;
      background: var(--btn-bg);
      color: var(--btn-text);
    }

    .them {
      align-self: flex-start;
      background: rgba(0,0,0,0.08);
    }

    body.dark .them {
      background: rgba(255,255,255,0.1);
    }

    /* ========================= INPUT ========================= */
    .chat-input {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 10px;
      border-top: 1px solid var(--input-border);
      gap: 10px;
      background: var(--bg);
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border: none;
      border-bottom: 1.5px solid var(--input-border);
      background: transparent;
      color: var(--text);
      outline: none;
    }

    .chat-input button {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <div class="chat-header">
    <img id="chatAvatar" alt="User Avatar"/>
    <span id="chatUsername">Loading...</span>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="messages"></div>

  <!-- INPUT -->
  <div class="chat-input">
    <input id="messageInput" placeholder="Type message..." />
    <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
  </div>

<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

const chatAvatar = document.getElementById("chatAvatar");
const chatUsername = document.getElementById("chatUsername");

// ========================= GET RECEIVER =========================
const params = new URLSearchParams(window.location.search);
const receiverId = params.get("userId");

if (!receiverId) {
  alert("Invalid chat");
  window.location.href = "friends.html";
}

// ========================= LOAD USER =========================
let currentUserId = null;

async function loadUser() {
  const token = Auth.getToken();
  if (!token) {
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`${API}/me`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  const data = await res.json();
  currentUserId = data.user._id;
}

// ========================= LOAD RECEIVER INFO =========================
async function loadReceiver() {
  const res = await fetch(`${API}/users/${receiverId}`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` }
  });

  const user = await res.json();

  chatUsername.textContent = user.username;
  chatAvatar.src = user.avatarUrl || "";
}

// ========================= SOCKET =========================
const socket = io("https://chatmate-kbwz.onrender.com", {
  auth: { token: Auth.getToken() }
});

socket.on("connect", () => {
  socket.emit("register", currentUserId);
  socket.emit("join_chat", { receiverId });
});

// ========================= SEND MESSAGE =========================
sendBtn.onclick = () => {
  const text = input.value.trim();
  if (!text) return;

  socket.emit("send_message", {
    to: receiverId,
    message: text
  });

  addMessage(text, "me");
  input.value = "";
};

// ========================= RECEIVE MESSAGE =========================
socket.on("receive_message", (data) => {
  if (data.from === receiverId) {
    addMessage(data.message, "them");
  }
});

// ========================= UI =========================
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.textContent = text;
  messagesDiv.appendChild(div);

  // Smooth scroll
  messagesDiv.scrollTo({
    top: messagesDiv.scrollHeight,
    behavior: "smooth"
  });
}

// ========================= INIT =========================
await loadUser();
await loadReceiver();
input.focus();
</script>

</body>
</html>
