<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<!-- ✅ VERY IMPORTANT FOR RESPONSIVENESS -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ✅ FIXED ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<style>
/* ========================= GLOBAL FIX ========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ========================= THEME ========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --subtle: #888;
  --input-border: #ddd;
  --primary: #1C1C1E;
  --white: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --subtle: #aaa;
  --input-border: #444;
  --primary: #fff;
  --white: #2C2C2E;
}

/* ========================= BODY ========================= */
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  justify-content: center;
  overflow: hidden;
  background-image: linear-gradient(to right, #e8e8e8 0%, var(--bg) 20%, var(--bg) 80%, #e8e8e8 100%);
}

body.dark {
  background-image: linear-gradient(to right, #000 0%, var(--bg) 20%, var(--bg) 80%, #000 100%);
}

/* ========================= WRAPPER ========================= */
.chat-wrapper {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
}

/* ========================= HEADER ========================= */
.chat-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  border-bottom: 1px solid rgba(0,0,0,0.05);
  z-index: 5;
}

body.dark .chat-header {
  background: rgba(0,0,0,0.3);
}

.chat-header img {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
}

.chat-header span {
  font-weight: 600;
  font-size: 15px;
  flex: 1;
}

/* ========================= MESSAGES ========================= */
.messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px;
  padding-bottom: 90px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  /* Fix 1: messages scroll independently, input stays fixed */
  -webkit-overflow-scrolling: touch;
}

/* ========================= MESSAGE BUBBLE ========================= */
.msg {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.4;
  word-wrap: break-word;
  display: flex;
  flex-direction: column;
}

.me {
  align-self: flex-end;
  background: var(--primary);
  color: var(--bg);
  border-bottom-right-radius: 4px;
}

.them {
  align-self: flex-start;
  background: var(--white);
  border-bottom-left-radius: 4px;
}

body.dark .them { background: #2C2C2E; }

.msg-time {
  font-size: 10px;
  opacity: 0.5;
  margin-top: 4px;
  align-self: flex-end;
}

/* ========================= INPUT ========================= */
/* Fix 1 + Fix 3: sticky bottom + glassmorphism */
.chat-input {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));

  /* Glassmorphism */
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.45);
  border-top: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
}

body.dark .chat-input {
  background: rgba(28, 28, 30, 0.55);
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
}

/* ========================= INPUT ROW ========================= */
.chat-input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  width: 100%;
}

/* ========================= TEXTAREA ========================= */
.chat-input textarea {
  flex: 1;
  padding: 10px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.4);

  /* Transparent glass textarea */
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  color: var(--text);
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.2px;
  min-height: 28px;
  max-height: 80px;
  line-height: 1.4;
  overflow-y: auto;
  resize: none;
  white-space: pre-wrap;
  word-wrap: break-word;
}

body.dark .chat-input textarea {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: #fff;
}

.chat-input textarea::placeholder { opacity: 0.5; }

/* ========================= SEND BUTTON ========================= */
.chat-input button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s;
}

.chat-input button:active { opacity: 0.7; }
.chat-input button i { font-size: 16px; color: inherit; }

/* ========================= TYPING INDICATOR ========================= */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  background: var(--white);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  width: fit-content;
  margin-bottom: 4px;
}

body.dark .typing-indicator { background: #2C2C2E; }

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #888;
  animation: typingBounce 1.2s infinite ease-in-out;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30%            { transform: translateY(-6px); }
}

/* ========================= REPLY QUOTE (IN BUBBLE) ========================= */
.reply-quote {
  display: flex;
  flex-direction: column;
  padding: 6px 10px;
  margin-bottom: 6px;
  border-left: 3px solid #4caf50;
  border-radius: 6px;
  background: rgba(0,0,0,0.08);
  cursor: pointer;
  gap: 2px;
}

body.dark .reply-quote { background: rgba(255,255,255,0.08); }
.reply-quote-sender { font-size: 11px; font-weight: 600; color: #4caf50; }
.reply-quote-text {
  font-size: 12px;
  opacity: 0.75;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ========================= REPLY PREVIEW (INPUT AREA) ========================= */
.reply-preview {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 8px 12px;
  border-left: 3px solid #4caf50;
  background: rgba(76,175,80,0.08);
  border-radius: 8px;
  margin-bottom: 6px;
  gap: 8px;
}

.reply-preview-inner {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex: 1;
}

.reply-preview-sender { font-size: 12px; font-weight: 600; color: #4caf50; }
.reply-preview-text {
  font-size: 12px;
  opacity: 0.7;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#cancelReply { cursor: pointer; opacity: 0.6; font-size: 14px; flex-shrink: 0; }
#cancelReply:hover { opacity: 1; }

/* ========================= CONTEXT MENU ========================= */
.context-menu {
  position: fixed;
  background: var(--white);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 999;
  overflow: hidden;
  min-width: 130px;
}

body.dark .context-menu { background: #2C2C2E; }

.context-item {
  padding: 12px 16px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.context-item:hover { background: rgba(0,0,0,0.05); }
body.dark .context-item:hover { background: rgba(255,255,255,0.05); }

/* ========================= HIGHLIGHT ORIGINAL ========================= */
@keyframes highlightPulse {
  0%   { background: rgba(76,175,80,0.3); }
  100% { background: transparent; }
}
.highlight { animation: highlightPulse 1.5s ease-out forwards; }

/* ========================= SCROLL TO BOTTOM BUTTON ========================= */
/* Fix 4 */
.scroll-down-btn {
  position: absolute;
  bottom: 80px;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  z-index: 20;
  display: none;
  align-items: center;
  justify-content: center;

  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  color: var(--text);
  transition: opacity 0.2s;
}

body.dark .scroll-down-btn {
  background: rgba(0, 0, 0, 0.3);
  color: #fff;
}

.scroll-down-btn.visible { display: flex; }
.scroll-down-btn:active { opacity: 0.7; }

/* ========================= LARGE SCREEN ========================= */
@media (min-width: 500px) {
  body { background-color: #e5e5e5; }
  body.dark { background-color: #000; }
}

/* ========================= MOBILE ========================= */
@media (max-width: 480px) {
  .msg { max-width: 85%; font-size: 13px; }
  .chat-input textarea { font-size: 13px; padding: 8px 10px; }
  .chat-input button { width: 38px; height: 38px; }
}
</style>

</head>

<body>

<div class="chat-wrapper">

  <!-- HEADER -->
  <div class="chat-header">
    <img id="chatAvatar" />
    <span id="chatUsername">Loading...</span>
    <i id="themeToggle" class="fa-solid fa-moon"></i>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="messages"></div>

  <!-- INPUT -->
  <div class="chat-input">
  <div id="replyPreview" class="reply-preview" style="display:none;">
    <div class="reply-preview-inner">
      <span id="replySender" class="reply-preview-sender"></span>
      <span id="replyText" class="reply-preview-text"></span>
    </div>
    <i id="cancelReply" class="fa-solid fa-xmark"></i>
  </div>
  <div class="chat-input-row">
    <textarea id="messageInput" placeholder="Type message..."></textarea>
    <button id="sendBtn">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>


<!-- SCROLL TO BOTTOM -->
<button class="scroll-down-btn" id="scrollDownBtn">
  <i class="fa-solid fa-chevron-down"></i>
</button>

</div>

<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

const token = Auth.getToken();
if (!token) { window.location.href = "login.html"; }

const params     = new URLSearchParams(window.location.search);
const receiverId = params.get("userId");
if (!receiverId) { window.location.href = "friends.html"; }

// ── ELEMENTS ──────────────────────────────────────────────
const messagesDiv   = document.getElementById("messages");
const input         = document.getElementById("messageInput");
const sendBtn       = document.getElementById("sendBtn");
const chatAvatar    = document.getElementById("chatAvatar");
const chatUsername  = document.getElementById("chatUsername");
const toggle        = document.getElementById("themeToggle");
const replyPreview  = document.getElementById("replyPreview");
const replyText     = document.getElementById("replyText");
const replySender   = document.getElementById("replySender");
const cancelReply   = document.getElementById("cancelReply");
const scrollDownBtn = document.getElementById("scrollDownBtn");

// ── THEME ─────────────────────────────────────────────────
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  toggle.classList.toggle("fa-sun");
  toggle.classList.toggle("fa-moon");
};

// ── STATE ─────────────────────────────────────────────────
let currentUserId   = null;
let currentUsername = null;
let replyingTo      = null;
let typingTimeout   = null;
let isTyping        = false;

// ── SCROLL TO BOTTOM BUTTON ───────────────────────────────
// Fix 4: show arrow when scrolled up, hide when at bottom
messagesDiv.addEventListener("scroll", () => {
  const distFromBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight;
  if (distFromBottom > 120) {
    scrollDownBtn.classList.add("visible");
  } else {
    scrollDownBtn.classList.remove("visible");
  }
});

scrollDownBtn.onclick = () => {
  messagesDiv.scrollTo({ top: messagesDiv.scrollHeight, behavior: "smooth" });
};

// ── LOAD CURRENT USER ─────────────────────────────────────
async function loadUser() {
  const res = await fetch(`${API}/me`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) { Auth.clearToken(); window.location.href = "login.html"; return; }
  const data = await res.json();
  currentUserId   = data.user._id;
  currentUsername = data.user.username;
}

// ── LOAD RECEIVER ─────────────────────────────────────────
async function loadReceiver() {
  const res = await fetch(`${API}/users/${receiverId}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) return;
  const user = await res.json();
  chatUsername.textContent = user.username;
  chatAvatar.src = user.avatarUrl || "";
}

// ── LOAD CHAT HISTORY ─────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${API}/messages/${receiverId}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) return;

    const { messages } = await res.json();
    messages.forEach(msg => {
      const type = msg.sender.toString() === currentUserId.toString() ? "me" : "them";
      addMessage({
        id:        msg._id,
        text:      msg.text,
        type,
        timestamp: msg.createdAt,
        replyTo:   msg.replyTo?.messageId ? msg.replyTo : null
      });
    });

    // Fix 2: scroll to bottom after history loads
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

  } catch (err) {
    console.error("History load error:", err);
  }
}

// ── MARK AS READ ──────────────────────────────────────────
async function markAsRead() {
  try {
    await fetch(`${API}/messages/${receiverId}/read`, {
      method: "POST",
      headers: { Authorization: `Bearer ${token}` }
    });
  } catch {}
}

// ── SOCKET ────────────────────────────────────────────────
const socket = io("https://chatmate-kbwz.onrender.com", { auth: { token } });

// ── INCOMING MESSAGE ──────────────────────────────────────
socket.on("receive_message", (data) => {
  if (data.from?.toString() === receiverId?.toString()) {
    hideTypingIndicator();
    addMessage({
      id:        data.messageId,
      text:      data.message,
      type:      "them",
      timestamp: data.timestamp,
      replyTo:   data.replyTo || null
    });
    markAsRead();
  }
});

// ── TYPING INDICATORS ─────────────────────────────────────
socket.on("typing_start", ({ from }) => {
  if (from?.toString() === receiverId?.toString()) showTypingIndicator();
});

socket.on("typing_stop", ({ from }) => {
  if (from?.toString() === receiverId?.toString()) hideTypingIndicator();
});

function showTypingIndicator() {
  let indicator = document.getElementById("typingIndicator");
  if (indicator) return;
  indicator = document.createElement("div");
  indicator.id = "typingIndicator";
  indicator.className = "typing-indicator";
  indicator.innerHTML = `<span></span><span></span><span></span>`;
  messagesDiv.appendChild(indicator);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function hideTypingIndicator() {
  const indicator = document.getElementById("typingIndicator");
  if (indicator) indicator.remove();
}

// ── TYPING EMIT ───────────────────────────────────────────
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";

  if (!isTyping) {
    isTyping = true;
    socket.emit("typing_start", { to: receiverId });
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    isTyping = false;
    socket.emit("typing_stop", { to: receiverId });
  }, 1500);
});

// ── REPLY SYSTEM ──────────────────────────────────────────
function setReply(messageId, text, sender) {
  replyingTo = { messageId, text, sender };
  replySender.textContent    = sender === currentUserId ? "You" : chatUsername.textContent;
  replyText.textContent      = text.length > 60 ? text.slice(0, 60) + "…" : text;
  replyPreview.style.display = "flex";
  input.focus();
}

function clearReply() {
  replyingTo = null;
  replyPreview.style.display = "none";
  replyText.textContent      = "";
  replySender.textContent    = "";
}

cancelReply.onclick = clearReply;

// ── SWIPE TO REPLY (MOBILE) ───────────────────────────────
function addSwipeListener(el, messageId, text, sender) {
  let startX = 0;

  el.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  }, { passive: true });

  el.addEventListener("touchmove", (e) => {
    const dx = e.touches[0].clientX - startX;
    if (dx > 0 && dx < 80) {
      el.style.transform  = `translateX(${dx}px)`;
      el.style.transition = "none";
    }
  }, { passive: true });

  el.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - startX;
    el.style.transition = "transform 0.2s ease";
    el.style.transform  = "translateX(0)";
    if (dx > 50) setReply(messageId, text, sender);
  });
}

// ── RIGHT-CLICK / DOUBLE-CLICK TO REPLY (DESKTOP) ────────
function addDesktopReplyListener(el, messageId, text, sender) {
  el.addEventListener("dblclick", () => setReply(messageId, text, sender));

  el.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    removeContextMenu();

    const menu = document.createElement("div");
    menu.id = "contextMenu";
    menu.className = "context-menu";
    menu.innerHTML = `<div class="context-item"><i class="fa-solid fa-reply"></i> Reply</div>`;
    menu.style.top  = `${e.clientY}px`;
    menu.style.left = `${e.clientX}px`;
    document.body.appendChild(menu);

    menu.querySelector(".context-item").onclick = () => {
      setReply(messageId, text, sender);
      removeContextMenu();
    };

    setTimeout(() => document.addEventListener("click", removeContextMenu, { once: true }), 0);
  });
}

function removeContextMenu() {
  const menu = document.getElementById("contextMenu");
  if (menu) menu.remove();
}

// ── SEND ──────────────────────────────────────────────────
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  isTyping = false;
  clearTimeout(typingTimeout);
  socket.emit("typing_stop", { to: receiverId });

  const payload = { to: receiverId, message: text };
  if (replyingTo) payload.replyTo = replyingTo;

  socket.emit("send_message", payload);

  addMessage({
    id:        null,
    text,
    type:      "me",
    timestamp: new Date(),
    replyTo:   replyingTo
  });

  clearReply();
  input.value = "";
  input.style.height = "auto";
}

sendBtn.onclick = sendMessage;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── RENDER MESSAGE ────────────────────────────────────────
function addMessage({ id, text, type, timestamp, replyTo }) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  if (id) div.dataset.messageId = id;

  const time = timestamp
    ? new Date(timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    : "";

  let replyHTML = "";
  if (replyTo?.messageId || replyTo?.text) {
    const replyLabel = replyTo.sender?.toString() === currentUserId?.toString()
      ? "You"
      : chatUsername.textContent;
    replyHTML = `
      <div class="reply-quote" data-target="${replyTo.messageId || ""}">
        <span class="reply-quote-sender">${escapeHTML(replyLabel)}</span>
        <span class="reply-quote-text">${escapeHTML(replyTo.text?.slice(0, 60) || "")}${replyTo.text?.length > 60 ? "…" : ""}</span>
      </div>
    `;
  }

  div.innerHTML = `
    ${replyHTML}
    <span class="msg-text">${escapeHTML(text)}</span>
    <span class="msg-time">${time}</span>
  `;

  if (replyTo?.messageId) {
    div.querySelector(".reply-quote")?.addEventListener("click", () => {
      const target = messagesDiv.querySelector(`[data-message-id="${replyTo.messageId}"]`);
      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        target.classList.add("highlight");
        setTimeout(() => target.classList.remove("highlight"), 1500);
      }
    });
  }

  addSwipeListener(div, id, text, type === "me" ? currentUserId : receiverId);
  addDesktopReplyListener(div, id, text, type === "me" ? currentUserId : receiverId);

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ── SAFETY ────────────────────────────────────────────────
function escapeHTML(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── INIT ──────────────────────────────────────────────────
await loadUser();
await loadReceiver();

socket.on("connect", () => {
  if (currentUserId) socket.emit("register", currentUserId);
});

if (socket.connected) {
  socket.emit("register", currentUserId);
} else {
  socket.connect();
}

sessionStorage.setItem("activeChatId", receiverId);
window.addEventListener("pagehide", () => {
  sessionStorage.removeItem("activeChatId");
});

await loadHistory();
await markAsRead();

</script>
</body>
</html>
