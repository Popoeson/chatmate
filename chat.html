<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://kit.fontawesome.com/your-kit.js"></script>

<style>
/* ========================= THEME ========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --input-border: #ccc;
  --btn-bg: #1C1C1E;
  --btn-text: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --input-bg: #2C2C2E;
  --btn-bg: #fff;
  --btn-text: #1C1C1E;
}

/* ========================= BODY ========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);

  height: 100dvh; /* ✅ FIX viewport */
  display: flex;
  flex-direction: column;
  overflow: hidden; /* prevents page overflow */
}

/* ========================= HEADER (GLASS) ========================= */
.chat-header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 10;

  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;

  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.2);
}

.chat-header img {
  width: 32px;
  height: 32px;
}

/* ========================= AVATAR ========================= */
.chat-header img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

/* ========================= MESSAGES ========================= */
.messages {
  position: absolute;
  top: 60px;   /* smaller header */
  bottom: 65px; /* smaller input */

  width: 100%;
  overflow-y: auto;

  padding: 10px;
  gap: 6px;
}

/* ========================= MESSAGE ========================= */
.msg {
  max-width: 80%;
  padding: 8px 10px;
  border-radius: 10px;
  font-size: 14px;
}

/* ========================= INPUT (GLASS + FIXED) ========================= */
.chat-input {
  position: fixed;
  bottom: 0;
  width: 100%;
  z-index: 10;

  display: flex;
  gap: 8px;
  padding: 8px 10px;

  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.2);
}

/* ========================= INPUT FIELD ========================= */
.chat-input input {
  padding: 8px;
  font-size: 14px;
}
/* ========================= SEND BUTTON ========================= */
.chat-input button {
  width: 38px;
  height: 38px;
}
  background: var(--btn-bg);
  color: var(--btn-text);

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
}

/* FIX ICON VISIBILITY */
.chat-input button i {
  color: var(--btn-text);
  font-size: 16px;
}

/* ========================= THEME TOGGLE ========================= */
#themeToggle {
  margin-left: auto;
  cursor: pointer;
}

@media (max-width: 480px) {
  .msg {
    max-width: 85%;
  }

  .chat-header span {
    font-size: 14px;
  }

  .messages {
    padding: 8px;
  }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="chat-header">
  <img id="chatAvatar" />
  <span id="chatUsername">Loading...</span>
  <i id="themeToggle" class="fa-solid fa-moon"></i>
</div>

<!-- MESSAGES -->
<div id="messages" class="messages"></div>

<!-- INPUT -->
<div class="chat-input">
  <input id="messageInput" placeholder="Type message..." />
  <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
</div>

<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

// ================= TOKEN =================
const token = Auth.getToken();
if (!token) {
  alert("Please login first");
  window.location.href = "login.html";
}

// ================= GET RECEIVER =================
const params = new URLSearchParams(window.location.search);
const receiverId = params.get("userId");

if (!receiverId) {
  alert("No user selected");
  window.location.href = "friends.html";
}

// ================= ELEMENTS =================
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const chatAvatar = document.getElementById("chatAvatar");
const chatUsername = document.getElementById("chatUsername");

// ================= THEME =================
const toggle = document.getElementById("themeToggle");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  toggle.classList.toggle("fa-sun");
  toggle.classList.toggle("fa-moon");
};

// ================= CURRENT USER =================
let currentUserId = null;

async function loadUser() {
  const res = await fetch(`${API}/me`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!res.ok) {
    Auth.clearToken();
    window.location.href = "login.html";
    return;
  }

  const data = await res.json();
  currentUserId = data.user._id;
}

// ================= LOAD RECEIVER =================
async function loadReceiver() {
  const res = await fetch(`${API}/users/${receiverId}`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!res.ok) {
    alert("Failed to load user");
    return;
  }

  const user = await res.json();

  chatUsername.textContent = user.username;
  chatAvatar.src = user.avatarUrl || "";
}

// ================= SOCKET =================
const socket = io("https://chatmate-kbwz.onrender.com", {
  auth: { token }
});

socket.on("connect", () => {
  if (currentUserId) {
    socket.emit("register", currentUserId);
    socket.emit("join_chat", { receiverId });
  }
});

// ================= SEND =================
sendBtn.onclick = () => {
  const text = input.value.trim();
  if (!text) return;

  socket.emit("send_message", {
    to: receiverId,
    message: text
  });

  addMessage(text, "me");
  input.value = "";
};

// ================= RECEIVE =================
socket.on("receive_message", (data) => {
  if (data.from === receiverId) {
    addMessage(data.message, "them");
  }
});

// ================= UI =================
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ================= INIT =================
await loadUser();
await loadReceiver();

// Ensure socket registers AFTER user loads
socket.emit("register", currentUserId);
socket.emit("join_chat", { receiverId });

</script>

</body>
</html>
