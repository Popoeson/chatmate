<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8" />
<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://kit.fontawesome.com/your-kit.js"></script>

<style>

/* ========================= THEME ========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --subtle: #888;
  --input-border: #ddd;
  --primary: #1C1C1E;
  --white: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --subtle: #aaa;
  --input-border: #444;
  --primary: #fff;
  --white: #2C2C2E;
}

/* ========================= BODY ========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);

  height: 100dvh;
  overflow: hidden;
}

/* ========================= HEADER ========================= */
.chat-header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 10;

  display: flex;
  align-items: center;
  gap: 10px;

  padding: 12px 14px;

  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

body.dark .chat-header {
  background: rgba(0,0,0,0.3);
}

/* Avatar */
.chat-header img {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
}

/* Username */
.chat-header span {
  font-weight: 600;
  font-size: 15px;
}

/* ========================= MESSAGES ========================= */
.messages {
  position: absolute;
  top: 65px;
  bottom: 70px;
  width: 100%;

  overflow-y: auto;
  padding: 12px;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ========================= MESSAGE ========================= */
.msg {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.4;

  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* My message */
.me {
  align-self: flex-end;
  background: var(--primary);
  color: var(--bg);
  border-bottom-right-radius: 4px;
}

/* Their message */
.them {
  align-self: flex-start;
  background: var(--white);
  border-bottom-left-radius: 4px;
}

/* Dark mode tweak */
body.dark .them {
  background: #2C2C2E;
}

/* ========================= INPUT ========================= */
.chat-input {
  position: fixed;
  bottom: 0;
  width: 100%;
  z-index: 10;

  display: flex;
  align-items: center;
  gap: 10px;

  padding: 10px 12px;

  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  border-top: 1px solid rgba(0,0,0,0.05);
}

body.dark .chat-input {
  background: rgba(0,0,0,0.3);
}

/* Input field */
.chat-input input {
  flex: 1;
  padding: 10px 12px;

  border-radius: 20px;
  border: 1px solid var(--input-border);

  background: transparent;
  color: var(--text);

  font-size: 14px;
  outline: none;
}

/* Send button */
.chat-input button {
  width: 42px;
  height: 42px;
  border-radius: 50%;

  border: none;
  background: var(--primary);
  color: var(--bg);

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
}

/* Icon fix */
.chat-input button i {
  font-size: 16px;
}

/* ========================= THEME TOGGLE ========================= */
#themeToggle {
  margin-left: auto;
  cursor: pointer;
}

/* ========================= MOBILE ========================= */
@media (max-width: 480px) {
  .messages {
    padding: 10px;
    gap: 8px;
  }

  .msg {
    max-width: 85%;
    font-size: 13px;
  }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="chat-header">
  <img id="chatAvatar" />
  <span id="chatUsername">Loading...</span>
  <i id="themeToggle" class="fa-solid fa-moon"></i>
</div>

<!-- MESSAGES -->
<div id="messages" class="messages"></div>

<!-- INPUT -->
<div class="chat-input">
  <input id="messageInput" placeholder="Type message..." />
  <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
</div>

<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

// ================= TOKEN =================
const token = Auth.getToken();
if (!token) {
  alert("Please login first");
  window.location.href = "login.html";
}

// ================= GET RECEIVER =================
const params = new URLSearchParams(window.location.search);
const receiverId = params.get("userId");

if (!receiverId) {
  alert("No user selected");
  window.location.href = "friends.html";
}

// ================= ELEMENTS =================
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const chatAvatar = document.getElementById("chatAvatar");
const chatUsername = document.getElementById("chatUsername");

// ================= THEME =================
const toggle = document.getElementById("themeToggle");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  toggle.classList.toggle("fa-sun");
  toggle.classList.toggle("fa-moon");
};

// ================= CURRENT USER =================
let currentUserId = null;

async function loadUser() {
  const res = await fetch(`${API}/me`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!res.ok) {
    Auth.clearToken();
    window.location.href = "login.html";
    return;
  }

  const data = await res.json();
  currentUserId = data.user._id;
}

// ================= LOAD RECEIVER =================
async function loadReceiver() {
  const res = await fetch(`${API}/users/${receiverId}`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!res.ok) {
    alert("Failed to load user");
    return;
  }

  const user = await res.json();

  chatUsername.textContent = user.username;
  chatAvatar.src = user.avatarUrl || "";
}

// ================= SOCKET =================
const socket = io("https://chatmate-kbwz.onrender.com", {
  auth: { token }
});

socket.on("connect", () => {
  if (currentUserId) {
    socket.emit("register", currentUserId);
    socket.emit("join_chat", { receiverId });
  }
});

// ================= SEND =================
sendBtn.onclick = () => {
  const text = input.value.trim();
  if (!text) return;

  socket.emit("send_message", {
    to: receiverId,
    message: text
  });

  addMessage(text, "me");
  input.value = "";
};

// ================= RECEIVE =================
socket.on("receive_message", (data) => {
  if (data.from === receiverId) {
    addMessage(data.message, "them");
  }
});

// ================= UI =================
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ================= INIT =================
await loadUser();
await loadReceiver();

// Ensure socket registers AFTER user loads
socket.emit("register", currentUserId);
socket.emit("join_chat", { receiverId });

</script>

</body>
</html>
