<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://kit.fontawesome.com/your-kit.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
    }

    .chat-header {
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #ccc;
    }

    .chat-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
    }

    .me {
      align-self: flex-end;
      background: #4caf50;
      color: white;
    }

    .them {
      align-self: flex-start;
      background: #ddd;
    }

    .chat-input {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .chat-input button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="chat-header">
    <img id="chatAvatar" />
    <span id="chatUsername">Loading...</span>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="messages"></div>

  <!-- INPUT -->
  <div class="chat-input">
    <input id="messageInput" placeholder="Type message..." />
    <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
  </div>

<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

const chatAvatar = document.getElementById("chatAvatar");
const chatUsername = document.getElementById("chatUsername");

// ========================= GET RECEIVER =========================
const params = new URLSearchParams(window.location.search);
const receiverId = params.get("userId");

if (!receiverId) {
  alert("Invalid chat");
  window.location.href = "friends.html";
}

// ========================= LOAD USER =========================
let currentUserId = null;

async function loadUser() {
  const token = Auth.getToken();
  if (!token) {
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`${API}/me`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  const data = await res.json();
  currentUserId = data.user._id;
}

// ========================= LOAD RECEIVER INFO =========================
async function loadReceiver() {
  const res = await fetch(`${API}/users/${receiverId}`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` }
  });

  const user = await res.json();

  chatUsername.textContent = user.username;
  chatAvatar.src = user.avatarUrl || "";
}

// ========================= SOCKET =========================
const socket = io("https://chatmate-kbwz.onrender.com", {
  auth: { token: Auth.getToken() }
});

socket.on("connect", () => {
  socket.emit("register", currentUserId);
  socket.emit("join_chat", { receiverId });
});

// ========================= SEND MESSAGE =========================
sendBtn.onclick = () => {
  const text = input.value.trim();
  if (!text) return;

  socket.emit("send_message", {
    to: receiverId,
    message: text
  });

  addMessage(text, "me");
  input.value = "";
};

// ========================= RECEIVE =========================
socket.on("receive_message", (data) => {
  if (data.from === receiverId) {
    addMessage(data.message, "them");
  }
});

// ========================= UI =========================
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ========================= INIT =========================
await loadUser();
await loadReceiver();

</script>

</body>
</html>
