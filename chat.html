<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://kit.fontawesome.com/your-kit.js"></script>

  <style>
    :root {
      --bg: #F8F7F4;
      --text: #1C1C1E;
      --input-border: #ccc;
      --btn-bg: #1C1C1E;
      --btn-text: #fff;
    }

    body.dark {
      --bg: #1C1C1E;
      --text: #fff;
      --input-bg: #2C2C2E;
      --btn-bg: #fff;
      --btn-text: #1C1C1E;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    .chat-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #ccc;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .chat-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg);
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
      word-wrap: break-word;
    }

    .me {
      align-self: flex-end;
      background: #4caf50;
      color: white;
    }

    .them {
      align-self: flex-start;
      background: #ddd;
    }

    .chat-input {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
      gap: 10px;
      background: var(--bg);
      position: sticky;
      bottom: 0;
      z-index: 2;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .chat-input button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
      cursor: pointer;
    }

    .chat-input button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <div class="chat-header">
    <img id="chatAvatar" />
    <span id="chatUsername">Loading chat...</span>
  </div>

  <!-- MESSAGES -->
  <div id="messages"></div>

  <!-- INPUT -->
  <div class="chat-input">
    <input id="messageInput" placeholder="Type message..." />
    <button id="sendBtn" disabled><i class="fa-solid fa-paper-plane"></i></button>
  </div>

  <script type="module">
    import { Auth } from "./session.js";

    const API = "https://chatmate-kbwz.onrender.com/api/auth";

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    const chatAvatar = document.getElementById("chatAvatar");
    const chatUsername = document.getElementById("chatUsername");

    // ========================= GET RECEIVER =========================
    const params = new URLSearchParams(window.location.search);
    const receiverId = params.get("userId");

    if (!receiverId) {
      alert("Invalid chat");
      window.location.href = "friends.html";
    }

    // ========================= LOAD USER =========================
    let currentUserId = null;

    async function loadUser() {
      const token = Auth.getToken();
      if (!token) {
        window.location.href = "login.html";
        return;
      }

      const res = await fetch(`${API}/me`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      const data = await res.json();
      currentUserId = data.user._id;
    }

    // ========================= LOAD RECEIVER INFO =========================
    async function loadReceiver() {
      const res = await fetch(`${API}/users/${receiverId}`, {
        headers: { Authorization: `Bearer ${Auth.getToken()}` }
      });

      const user = await res.json();
      chatUsername.textContent = user.username;
      chatAvatar.src = user.avatarUrl || "";
    }

    // ========================= SOCKET =========================
    let socket;

    async function initChat() {
      await loadUser();
      await loadReceiver();

      // Enable input now
      sendBtn.disabled = false;
      input.focus();

      socket = io("https://chatmate-kbwz.onrender.com", {
        auth: { token: Auth.getToken() }
      });

      socket.on("connect", () => {
        socket.emit("register", currentUserId);
        socket.emit("join_chat", { receiverId });
      });

      // RECEIVE
      socket.on("receive_message", (data) => {
        if (data.from === receiverId) {
          addMessage(data.message, "them");
        }
      });
    }

    // ========================= SEND MESSAGE =========================
    sendBtn.onclick = () => {
      const text = input.value.trim();
      if (!text) return;

      socket.emit("send_message", {
        to: receiverId,
        message: text
      });

      addMessage(text, "me");
      input.value = "";
    };

    // ========================= UI =========================
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ========================= INIT =========================
    initChat();
  </script>
</body>
</html>
