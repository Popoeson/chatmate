
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMate - Friends</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f9f9f9;
  color: #111;
}
body.dark { background: #111; color: #fff; }

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
  color: #fff;
}
.header-icons i { cursor: pointer; margin-left: 10px; }

/* TAB BUTTONS */
.tabs {
  display: flex;
  justify-content: space-around;
  margin: 10px 0;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
}
.tab-btn.active {
  border-bottom: 2px solid #4caf50;
  font-weight: bold;
}

/* SEARCH */
.search-container { padding: 10px; }
.search-container input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

/* LIST CONTAINERS */
.list-container { padding: 10px; display: none; }
.list-container.active { display: block; }

/* CARD */
.card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 8px 0;
  padding: 12px;
  background: #fff;
  border-radius: 12px;
}
body.dark .card { background: #222; }

.card-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.card img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  cursor: pointer;
}

.actions button {
  margin-left: 5px;
  padding: 5px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* MODALS */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content:center;
  align-items:center;
}
.modal.show { display: flex; }

.modal-content {
  background:#fff;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:300px;
}
body.dark .modal-content { background:#1C1C1E; }

.avatar-large {
  width:100px;
  height:100px;
  border-radius:50%;
  cursor:pointer;
}

.preview img {
  width:80%;
  max-width:400px;
}

.badge {
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
}
.tab-badge {
  background: red;
  color: white;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 12px;
  margin-left: 6px;
  display: none;
}

.badge.friend { background: #4caf50; color: #fff; }
.badge.pending { background: orange; color: #fff; }

/* =========================
   LOADER (BUTTON / INLINE)
========================= */
body.dark .loader span {
  background: #fff; /* white in dark mode */
}
body:not(.dark) .loader span {
  background: #000; /* black in light mode */
}

.loader {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader.active { display: inline-flex; }

.loader span {
  width: 6px;
  height: 6px;
  margin: 0 2px;
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   PAGE SPINNER
========================= */
.page-loader {
  display: flex;
  justify-content: center;
  padding: 30px;
}

body.dark .spinner {
  border: 3px solid #555;
  border-top: 3px solid #0f0; /* example accent */
}
body:not(.dark) .spinner {
  border: 3px solid #ccc;
  border-top: 3px solid #28a745; /* example accent */
}

.spinner {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* =========================
   SKELETON CARDS
========================= */
.skeleton-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 12px;
  animation: pulse 1.2s infinite;
}

.skeleton-avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

.skeleton-text {
  width: 120px;
  height: 12px;
  border-radius: 6px;
}

body.dark .skeleton-card { background: rgba(255,255,255,0.05); }
body:not(.dark) .skeleton-card { background: rgba(0,0,0,0.05); }

body.dark .skeleton-avatar { background: #444; }
body:not(.dark) .skeleton-avatar { background: #ddd; }

body.dark .skeleton-text { background: #555; }
body:not(.dark) .skeleton-text { background: #ccc; }

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* =========================
   TOAST NOTIFICATIONS
========================= */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 18px;
  border-radius: 999px;
  font-size: 14px;
  opacity: 0;
  transition: 0.3s;
  z-index: 9999;
  color: #fff;
}

body.dark .toast { background: #1c1c1e; }
body:not(.dark) .toast { background: #f0f0f0; color: #111; }

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { background: #28a745; }
.toast.error { background: #dc3545; }
.toast.info { background: #007bff; }

</style>
</head>

<body>

<header>
  <div>Friends</div>
  <div class="header-icons">
    <i id="themeToggle" class="fa-solid fa-moon"></i>
  </div>
</header>

<div class="search-container">
  <input id="searchInput" placeholder="Search username...">
</div>

<div id="searchResults"></div>

<!-- TAB BUTTONS -->
<div class="tabs">
  <div id="tabFriends" class="tab-btn active">
    <i class="fa-solid fa-user-group"></i> Friends
    <span class="tab-badge" id="friendsBadge"></span>
  </div>

  <div id="tabSent" class="tab-btn">
    <i class="fa-solid fa-paper-plane"></i> Sent
    <span class="tab-badge" id="sentBadge"></span>
  </div>

  <div id="tabReceived" class="tab-btn">
    <i class="fa-solid fa-inbox"></i> Received
    <span class="tab-badge" id="receivedBadge"></span>
  </div>
</div>

<!-- FRIENDS LIST -->
<div id="friendsList" class="list-container active"></div>

<!-- SENT REQUESTS LIST -->
<div id="sentList" class="list-container"></div>

<!-- RECEIVED REQUESTS LIST -->
<div id="receivedList" class="list-container"></div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal">
  <div class="modal-content">
    <img id="viewAvatar" class="avatar-large">
    <h3 id="viewUsername"></h3>
    <p id="viewBio"></p>
  </div>
</div>

<!-- IMAGE PREVIEW -->
<div id="imagePreview" class="modal preview">
  <img id="previewImg">
</div>


<script type="module">
import { Auth } from "./session.js";
import UI from "./utils/ui.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

document.addEventListener("DOMContentLoaded", async () => {

  // ========================= ELEMENTS =========================
  const searchInput = document.getElementById("searchInput");
  const friendsList = document.getElementById("friendsList");
  const sentList = document.getElementById("sentList");
  const receivedList = document.getElementById("receivedList");
  const resultsDiv = document.getElementById("searchResults");

  const profileModal = document.getElementById("profileModal");
  const imagePreview = document.getElementById("imagePreview");
  const viewAvatar = document.getElementById("viewAvatar");
  const viewUsername = document.getElementById("viewUsername");
  const viewBio = document.getElementById("viewBio");
  const previewImg = document.getElementById("previewImg");

  const tabFriends = document.getElementById("tabFriends");
  const tabSent = document.getElementById("tabSent");
  const tabReceived = document.getElementById("tabReceived");

  // ✅ BADGE ELEMENTS
  const friendsCountEl = document.getElementById("friendsBadge");
  const sentCountEl = document.getElementById("sentBadge");
  const receivedCountEl = document.getElementById("receivedBadge");

  // ========================= THEME =========================
  const toggle = document.getElementById("themeToggle");
  const icon = toggle.querySelector("i");

  toggle.onclick = () => {
    document.body.classList.toggle("dark");
    icon.classList.toggle("fa-sun");
    icon.classList.toggle("fa-moon");
  };

  // ========================= STATE =========================
  let currentUserId = null;
  let friendsData = [];
  let sentData = [];
  let receivedData = [];

  const DEFAULT_AVATAR = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#888"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>`;

  // ========================= LOAD USER =========================
  async function loadUser() {
    const token = Auth.getToken();
    if (!token) {
      window.location.href = "login.html";
      return;
    }

    try {
      const res = await fetch(`${API}/me`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (!res.ok) {
        Auth.clearToken();
        window.location.href = "login.html";
        return;
      }

      const data = await res.json();
      currentUserId = data.user._id;

    } catch {
      Auth.clearToken();
      window.location.href = "login.html";
    }
  }

  // ========================= TAB BADGES =========================
  function updateTabBadges() {
    const update = (el, count) => {
      if (!el) return;

      if (count > 0) {
        el.style.display = "inline-block";
        el.textContent = count;
      } else {
        el.style.display = "none";
      }
    };

    update(friendsCountEl, friendsData.length);
    update(sentCountEl, sentData.length);
    update(receivedCountEl, receivedData.length);
  }

  // ========================= LOAD FRIENDS =========================
  async function loadFriends() {
    try {
      const res = await fetch(`${API}/friends`, {
        headers: { Authorization: `Bearer ${Auth.getToken()}` }
      });

      if (!res.ok) throw new Error();

      const data = await res.json();

      friendsData = Array.isArray(data.friends) ? data.friends : [];
      sentData = Array.isArray(data.sentRequests) ? data.sentRequests : [];
      receivedData = Array.isArray(data.receivedRequests) ? data.receivedRequests : [];

      // ✅ UPDATE BADGES
      updateTabBadges();

      // CLEAR
      friendsList.innerHTML = "";
      sentList.innerHTML = "";
      receivedList.innerHTML = "";

      // FRIENDS
      if (!friendsData.length) {
        friendsList.innerHTML = "<p>No friends yet</p>";
      } else {
        friendsData.forEach(u => friendsList.appendChild(createCard(u, "friend")));
      }

      // SENT
      if (!sentData.length) {
        sentList.innerHTML = "<p>No sent requests</p>";
      } else {
        sentData.forEach(u => sentList.appendChild(createCard(u, "sent")));
      }

      // RECEIVED
      if (!receivedData.length) {
        receivedList.innerHTML = "<p>No received requests</p>";
      } else {
        receivedData.forEach(u => receivedList.appendChild(createCard(u, "received")));
      }

    } catch {
      UI.showToast("Failed to load friends", "error");
    }
  }

  // ========================= RELATIONSHIP =========================
  function getRelationship(userId) {
    const uid = userId.toString();
    if (friendsData.some(u => u._id === uid)) return "friend";
    if (sentData.some(u => u._id === uid)) return "sent";
    if (receivedData.some(u => u._id === uid)) return "received";
    return "none";
  }

  // ========================= CREATE CARD =========================
  function createCard(user, type) {
    const card = document.createElement("div");
    card.className = "card";

    const avatarHTML = user.avatarUrl
      ? `<img src="${user.avatarUrl}">`
      : `<span style="width:45px;height:45px;">${DEFAULT_AVATAR}</span>`;

    let actionsHTML = "";
    if (type === "friend") actionsHTML = `<span style="color:green;">Friend</span>`;
    if (type === "sent") actionsHTML = `<button class="delete-btn">Delete</button>`;
    if (type === "received") actionsHTML = `<button class="accept-btn">Accept</button><button class="reject-btn">Reject</button>`;
    if (type === "none") actionsHTML = `<button class="add-btn">Add</button>`;

    card.innerHTML = `
      <div class="card-left">
        ${avatarHTML}
        <span>${user.username}</span>
      </div>
      <div class="actions">
        <button class="view-btn">View</button>
        ${actionsHTML}
      </div>
    `;

    // VIEW
    card.querySelector(".view-btn").onclick = () => {
      viewAvatar.src = user.avatarUrl || "";
      viewUsername.textContent = user.username;
      viewBio.textContent = user.bio || "";
      profileModal.classList.add("show");
    };

    // ACTIONS
    if (type === "sent") {
      card.querySelector(".delete-btn").onclick = async () => {
        await fetch(`${API}/friends/request/${user._id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${Auth.getToken()}` }
        });
        UI.showToast("Request deleted", "info");
        loadFriends();
      };
    }

    if (type === "received") {
      card.querySelector(".accept-btn").onclick = async () => {
        await fetch(`${API}/friends/request/${user._id}/accept`, {
          method: "POST",
          headers: { Authorization: `Bearer ${Auth.getToken()}` }
        });
        UI.showToast("Request accepted", "success");
        loadFriends();
      };

      card.querySelector(".reject-btn").onclick = async () => {
        await fetch(`${API}/friends/request/${user._id}/reject`, {
          method: "POST",
          headers: { Authorization: `Bearer ${Auth.getToken()}` }
        });
        UI.showToast("Request rejected", "error");
        loadFriends();
      };
    }

    if (type === "none") {
      card.querySelector(".add-btn").onclick = async () => {
        try {
          const res = await fetch(`${API}/friends/request`, {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${Auth.getToken()}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ userId: user._id })
          });

          if (!res.ok) throw new Error();

          UI.showToast("Friend request sent", "success");
          loadFriends();

        } catch {
          UI.showToast("Could not send request", "error");
        }
      };
    }

    return card;
  }

  // ========================= TABS =========================
  function setActiveTab(tab) {
    tabFriends.classList.remove("active");
    tabSent.classList.remove("active");
    tabReceived.classList.remove("active");

    friendsList.classList.remove("active");
    sentList.classList.remove("active");
    receivedList.classList.remove("active");

    if (tab === "friends") {
      tabFriends.classList.add("active");
      friendsList.classList.add("active");
    }
    if (tab === "sent") {
      tabSent.classList.add("active");
      sentList.classList.add("active");
    }
    if (tab === "received") {
      tabReceived.classList.add("active");
      receivedList.classList.add("active");
    }
  }

  tabFriends.onclick = () => setActiveTab("friends");
  tabSent.onclick = () => setActiveTab("sent");
  tabReceived.onclick = () => setActiveTab("received");

  // ========================= SEARCH =========================
  searchInput.addEventListener("input", async () => {
    const query = searchInput.value.trim();
    if (!query) {
      resultsDiv.innerHTML = "";
      return;
    }

    UI.showSkeleton(resultsDiv, 3);

    try {
      const res = await fetch(`${API}/users/search?username=${query}`, {
        headers: { Authorization: `Bearer ${Auth.getToken()}` }
      });

      const data = await res.json();

      resultsDiv.innerHTML = "";

      if (!data.users.length) {
        resultsDiv.innerHTML = `<p>No results found</p>`;
      } else {
        data.users
          .filter(u => u._id !== currentUserId)
          .forEach(user => {
            resultsDiv.appendChild(createCard(user, getRelationship(user._id)));
          });
      }

    } catch {
      UI.showToast("Search failed", "error");
    }
  });

  // ========================= INIT =========================
  await loadUser();
  await loadFriends();
  setActiveTab("friends");

  UI.setupCloseOnOutside(profileModal);
  UI.setupImageModal(imagePreview, previewImg);

});
</script>
</body>
</html>
