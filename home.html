<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMate - Homepage</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f9f9f9;
  color: #111;
  transition: 0.3s;
}
body.dark { background: #111; color: #fff; }

/* HEADER */
header {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
  color: #fff;
  z-index: 10;
}
.user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.user-info img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
.user-info span { font-weight: bold; font-size: 16px; color: #fff; }
.header-icons { display: flex; gap: 16px; align-items: center; }
.header-icons i { cursor: pointer; }
.icon-wrapper { position: relative; display: inline-block; }

.badge {
  position: absolute;
  top: -5px; right: -8px;
  background: red;
  color: white;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 50%;
  font-weight: bold;
  display: none;
}

/* CHAT LIST */
main {
  height: calc(100vh - 120px);
  overflow-y: auto;
  padding: 10px;
  padding-bottom: 70px;
}

/* CHAT CARD */
.chat-card {
  display: flex;
  align-items: center;
  padding: 12px;
  margin-bottom: 10px;
  background: #fff;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
}
body.dark .chat-card { background: #222; }
.chat-card:active { background: #f0f0f0; }
body.dark .chat-card:active { background: #333; }

.chat-card img {
  width: 50px; height: 50px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 12px;
  flex-shrink: 0;
}

.chat-card-body { flex: 1; overflow: hidden; }
.chat-card-body b { display: block; font-size: 15px; }
.chat-card-body p {
  font-size: 13px;
  color: #888;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.chat-time {
  font-size: 11px;
  color: #aaa;
  position: absolute;
  top: 12px; right: 12px;
}

/* UNREAD BADGE ON CARD */
.unread-badge {
  position: absolute;
  bottom: 12px; right: 12px;
  background: #4caf50;
  color: #fff;
  font-size: 11px;
  font-weight: bold;
  padding: 2px 7px;
  border-radius: 999px;
  display: none;
}

/* PULSE ANIMATION */
@keyframes pulse-card {
  0%   { box-shadow: 0 0 0 0 rgba(76,175,80,0.5); }
  70%  { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
  100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
}
.pulse { animation: pulse-card 0.8s ease-out; }

/* ── CARD META (time + badge stacked) ── */
.card-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.chat-time {
  font-size: 11px;
  color: #aaa;
}

/* ── TICK ── */
.msg-tick {
  font-size: 11px;
  font-weight: bold;
}
.msg-tick.sent      { color: #aaa; }
.msg-tick.delivered { color: #4caf50; }

/* ── CARD TYPING INDICATOR ── */
.card-typing {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

.card-typing span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #888;
  animation: typingBounce 1.2s infinite ease-in-out;
}
.card-typing span:nth-child(2) { animation-delay: 0.2s; }
.card-typing span:nth-child(3) { animation-delay: 0.4s; }

/* FOOTER */
footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
  color: #fff;
  transition: transform 0.3s ease;
  z-index: 10;
}
footer.hide { transform: translateY(100%); }
.footer-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  font-size: 12px;
  gap: 3px;
}
.footer-item.active { color: #4caf50; }
.footer-chat-wrapper { position: relative; }
#chatFooterBadge {
  position: absolute;
  top: -5px; right: -8px;
  background: red;
  color: white;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 50%;
  font-weight: bold;
  display: none;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
  <div class="user-info" onclick="window.location.href='my-profile.html'">
  <img id="avatarImg" alt="Avatar">
  <span id="usernameDisplay">Username</span>
</div>

  <div class="header-icons">
  <i id="encryptionToggle" class="fa-solid fa-lock"></i>
  <i id="themeToggle" class="fa-solid fa-moon"></i>

  <div class="icon-wrapper">
    <i id="addFriendBtn" class="fa-solid fa-plus"></i>
    <span id="friendBadge" class="badge">0</span>
  </div>
</div>
</header>

<!-- CHAT LIST -->
<main id="chatList">
  <div id="emptyState" style="display:none; text-align:center; padding:40px; color:#888;">
    <i class="fa-solid fa-comment-slash" style="font-size:40px; margin-bottom:10px;"></i>
    <p>No chats yet. Add friends to start chatting.</p>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-item"><i class="fa-solid fa-circle-user"></i><span>Status</span></div>
  <div class="footer-item active">
    <div class="footer-chat-wrapper">
      <i class="fa-solid fa-comment"></i>
      <span id="chatFooterBadge"></span>
    </div>
    <span>Chats</span>
  </div>
  <div class="footer-item"><i class="fa-solid fa-upload"></i><span>Posts</span></div>
  <div class="footer-item" onclick="window.location.href='my-profile.html'">
    <i class="fa-solid fa-user"></i><span>Profile</span>
  </div>
  <div class="footer-item"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
</footer>

<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

document.addEventListener("DOMContentLoaded", async () => {

  // ── ELEMENTS ──────────────────────────────────────────────
  const chatList         = document.getElementById("chatList");
  const emptyState       = document.getElementById("emptyState");
  const addFriendBtn     = document.getElementById("addFriendBtn");
  const friendBadge      = document.getElementById("friendBadge");
  const toggle           = document.getElementById("themeToggle");
  const encryptionToggle = document.getElementById("encryptionToggle");
  const footer           = document.querySelector("footer");
  const chatFooterBadge  = document.getElementById("chatFooterBadge");

  // ── STATE ─────────────────────────────────────────────────
  let currentUserId    = null;
  let friendNotifCount = 0;
  let socket           = null;

  // friendId → { card, unreadCount, lastMessage, lastMsgEl, unreadEl, isMine }
  const cardMap = new Map();

  // ── HELPERS ───────────────────────────────────────────────
  function getActiveChatId() {
    return sessionStorage.getItem("activeChatId") || null;
  }

  function escapeHTML(str) {
    if (!str) return "";
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    return d.toLocaleDateString([], { month: "short", day: "numeric" });
  }

  function updateFriendBadge(count) {
    friendBadge.style.display = count > 0 ? "inline-block" : "none";
    friendBadge.textContent   = count || "";
  }

  function updateFooterChatBadge() {
    let usersWithUnread = 0;
    for (const [, state] of cardMap) {
      if (state.unreadCount > 0) usersWithUnread++;
    }
    chatFooterBadge.style.display = usersWithUnread > 0 ? "inline-block" : "none";
    chatFooterBadge.textContent   = usersWithUnread || "";
  }

  function buildLastMsgHTML(text, isMine, delivered) {
    if (!isMine) return escapeHTML(text);
    const tickClass = delivered ? "delivered" : "sent";
    const tickChar  = delivered ? "✓✓" : "✓";
    return `<span class="msg-tick ${tickClass}">${tickChar}</span>${escapeHTML(text)}`;
  }

  // ── THEME ─────────────────────────────────────────────────
  toggle.onclick = () => {
    document.body.classList.toggle("dark");
    toggle.classList.toggle("fa-sun");
    toggle.classList.toggle("fa-moon");
  };

  let encrypted = true;
  encryptionToggle.onclick = () => {
    encrypted = !encrypted;
    encryptionToggle.classList.toggle("fa-lock", encrypted);
    encryptionToggle.classList.toggle("fa-lock-open", !encrypted);
  };

  addFriendBtn.onclick = () => {
    friendNotifCount = 0;
    updateFriendBadge(0);
    window.location.href = "friends.html";
  };

  // ── CREATE CARD ───────────────────────────────────────────
  function createCard({ friendId, username, avatarUrl, lastMessage, lastTime, unreadCount, isMine, delivered }) {
    const card = document.createElement("div");
    card.className = "chat-card";
    card.dataset.friendId = friendId;

    card.innerHTML = `
      <img src="${avatarUrl || "https://i.pravatar.cc/50"}" alt="${escapeHTML(username)}">
      <div class="chat-card-body">
        <b>${escapeHTML(username)}</b>
        <p class="last-msg">${buildLastMsgHTML(lastMessage, isMine, delivered)}</p>
      </div>
      <div class="card-meta">
        <span class="chat-time">${formatTime(lastTime)}</span>
        <span class="unread-badge" style="display:${unreadCount > 0 ? "inline-block" : "none"}">${unreadCount}</span>
      </div>
    `;

    const unreadEl  = card.querySelector(".unread-badge");
    const lastMsgEl = card.querySelector(".last-msg");

    card.onclick = async () => {
  const state = cardMap.get(friendId);
  if (state && state.unreadCount > 0) {
    // Clear badge immediately on click
    state.unreadCount = 0;
    unreadEl.textContent   = "0";
    unreadEl.style.display = "none";
    updateFooterChatBadge();

    // Mark read on server in background
    fetch(`${API}/messages/${friendId}/read`, {
      method: "POST",
      headers: { Authorization: `Bearer ${Auth.getToken()}` }
    }).catch(() => {});
  }
  window.location.href = `chat.html?userId=${friendId}`;
};

    cardMap.set(friendId, {
      card,
      unreadCount,
      lastMessage,
      lastMsgEl,
      unreadEl,
      isMine:    isMine    || false,
      delivered: delivered || false
    });

    return card;
  }

  // ── UPSERT CARD ───────────────────────────────────────────
  function upsertCard(data, isNew = false) {
    const { friendId, lastMessage, lastTime, unreadCount } = data;

    // sender's own update always comes with unreadCount: 0
    const isMine      = isNew && unreadCount === 0;
    const activeChatId  = getActiveChatId();
    const isActiveChat  = activeChatId === friendId;

    if (cardMap.has(friendId)) {
      const state = cardMap.get(friendId);
      const { card, lastMsgEl, unreadEl } = state;

      // Update last message + tick
      state.isMine      = isMine;
      state.delivered   = false; // reset — wait for message_delivered event
      state.lastMessage = lastMessage;
      lastMsgEl.innerHTML = buildLastMsgHTML(lastMessage, isMine, false);

      card.querySelector(".chat-time").textContent = formatTime(lastTime);

      // Unread logic
      if (isNew && !isMine && !isActiveChat) {
        state.unreadCount += 1;
        unreadEl.textContent   = state.unreadCount;
        unreadEl.style.display = "inline-block";
      } else if (isNew && !isMine && isActiveChat) {
        fetch(`${API}/messages/${friendId}/read`, {
          method: "POST",
          headers: { Authorization: `Bearer ${Auth.getToken()}` }
        }).catch(() => {});
        state.unreadCount = 0;
        unreadEl.style.display = "none";
      }

      // Move to top + pulse
      chatList.prepend(card);
      card.classList.remove("pulse");
      void card.offsetWidth;
      card.classList.add("pulse");
      setTimeout(() => card.classList.remove("pulse"), 900);

    } else {
      const effectiveUnread = (isNew && !isMine && !isActiveChat) ? 1 : 0;
      const card = createCard({
        ...data,
        unreadCount: effectiveUnread,
        isMine,
        delivered: false
      });
      chatList.prepend(card);
      emptyState.style.display = "none";

      if (isNew && !isMine && isActiveChat) {
        fetch(`${API}/messages/${friendId}/read`, {
          method: "POST",
          headers: { Authorization: `Bearer ${Auth.getToken()}` }
        }).catch(() => {});
      }

      if (isNew) {
        card.classList.add("pulse");
        setTimeout(() => card.classList.remove("pulse"), 900);
      }
    }

    updateFooterChatBadge();
  }

  // ── TYPING ON CARD ────────────────────────────────────────
  function showCardTyping(friendId) {
    const state = cardMap.get(friendId);
    if (!state) return;
    state.lastMsgEl.innerHTML = `
      <span class="card-typing">
        <span></span><span></span><span></span>
      </span>
    `;
  }

  function hideCardTyping(friendId) {
    const state = cardMap.get(friendId);
    if (!state) return;
    state.lastMsgEl.innerHTML = buildLastMsgHTML(
      state.lastMessage || "",
      state.isMine,
      state.delivered
    );
  }

  // ── TICK: MARK DELIVERED ──────────────────────────────────
  function setCardDelivered(friendId) {
    const state = cardMap.get(friendId);
    if (!state || !state.isMine) return;
    state.delivered = true;
    const tick = state.lastMsgEl.querySelector(".msg-tick");
    if (tick) {
      tick.textContent = "✓✓";
      tick.classList.remove("sent");
      tick.classList.add("delivered");
    }
  }

  // ── LOAD CONVERSATIONS ────────────────────────────────────
  async function loadConversations() {
    try {
      const res = await fetch(`${API}/conversations`, {
        headers: { Authorization: `Bearer ${Auth.getToken()}` }
      });
      if (!res.ok) return;

      const { conversations } = await res.json();

      chatList.innerHTML = "";
      chatList.appendChild(emptyState);
      cardMap.clear();

      if (!conversations.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";
      conversations.forEach(c => {
        const isMine = c.lastSender?.toString() === currentUserId?.toString();
        const card = createCard({
          ...c,
          isMine,
          delivered: isMine ? c.delivered : false
        });
        chatList.appendChild(card);
      });

      updateFooterChatBadge();

    } catch (err) {
      console.error("Load conversations error:", err);
    }
  }

  // ── LOAD USER ─────────────────────────────────────────────
  async function loadUser() {
    const token = Auth.getToken();
    if (!token) { window.location.href = "login.html"; return; }

    try {
      const res = await fetch(`${API}/me`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) { Auth.clearToken(); window.location.href = "login.html"; return; }

      const { user } = await res.json();
      currentUserId = user._id;

      document.getElementById("usernameDisplay").textContent = user.username || user.email;
      document.getElementById("avatarImg").src = user.avatarUrl || "https://i.pravatar.cc/50";

    } catch {
      window.location.href = "login.html";
    }
  }

  // ── FETCH PENDING FRIEND COUNT ────────────────────────────
  async function fetchPendingCount() {
    try {
      const res = await fetch(`${API}/friends`, {
        headers: { Authorization: `Bearer ${Auth.getToken()}` }
      });
      if (!res.ok) return;
      const data = await res.json();
      friendNotifCount = (data.receivedRequests || []).length;
      updateFriendBadge(friendNotifCount);
    } catch {}
  }

  // ── SOCKET ────────────────────────────────────────────────
  function initSocket() {
    socket = io("https://chatmate-kbwz.onrender.com", {
      auth: { token: Auth.getToken() }
    });

    socket.on("connect", () => {
      socket.emit("register", currentUserId);
    });

    socket.on("new_conversation_message", (data) => {
      upsertCard(data, true);
    });

    socket.on("typing_start", ({ from }) => {
      showCardTyping(from);
    });

    socket.on("typing_stop", ({ from }) => {
      hideCardTyping(from);
    });

    socket.on("message_delivered", ({ friendId }) => {
      setCardDelivered(friendId);
    });

    socket.on("friend_request_received", fetchPendingCount);
    socket.on("friend_request_accepted", fetchPendingCount);
    socket.on("friend_request_rejected", fetchPendingCount);
    socket.on("friend_request_deleted",  fetchPendingCount);
  }

  // ── FOOTER HIDE ON SCROLL ─────────────────────────────────
  let lastScroll = 0;
  window.addEventListener("scroll", () => {
    const cur = window.pageYOffset;
    footer.classList.toggle("hide", cur > lastScroll && cur > 50);
    lastScroll = cur;
  });

// ── INIT ──────────────────────────────────────────────────
await loadUser();
await loadReceiver();

socket.on("connect", () => {
  if (currentUserId) socket.emit("register", currentUserId);
});

if (socket.connected) {
  socket.emit("register", currentUserId);
} else {
  socket.connect();
}

sessionStorage.setItem("activeChatId", receiverId);

window.addEventListener("pagehide", () => {
  sessionStorage.removeItem("activeChatId");
});

await loadHistory();

// Mark all messages from this user as read on open
fetch(`${API}/messages/${receiverId}/read`, {
  method: "POST",
  headers: { Authorization: `Bearer ${token}` }
}).catch(() => {});
</script>

</body>
</html>
