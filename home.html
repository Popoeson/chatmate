<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMate - Homepage</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
/* ========================= GLOBAL ========================= */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f9f9f9;
  color: #111;
  transition: 0.3s;
}
body.dark { background: #111; color: #fff; }

/* ========================= HEADER ========================= */
header {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
  color: #fff;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-info img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
}

.user-info span {
  font-weight: bold;
  font-size: 16px;
  color: #fff;
}

.header-icons {
  display: flex;
  gap: 16px;
}
.header-icons i {
  cursor: pointer;
}

.icon-wrapper {
  position: relative;
  display: inline-block;
}

.badge {
  position: absolute;
  top: -5px;
  right: -8px;
  background: red;
  color: white;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 50%;
  font-weight: bold;
  display: none; /* hidden by default */
}

/* ========================= CHAT LIST ========================= */
main {
  height: calc(100vh - 120px);
  overflow-y: auto;
  padding: 10px;
}

.chat-card {
  display: flex;
  align-items: center;
  padding: 12px;
  margin-bottom: 10px;
  background: #fff;
  border-radius: 12px;
  cursor: pointer;
}
body.dark .chat-card { background: #222; }

.chat-card img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  margin-right: 10px;
}

/* ========================= FOOTER ========================= */
footer {
  position: fixed; /* change to fixed for smooth hide/show */
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
  color: #fff;
  transition: transform 0.3s ease;
}
footer.hide {
  transform: translateY(100%); /* move footer out of viewport */
}
.footer-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}
.footer-item.active { color: #4caf50; }

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="user-info" onclick="window.location.href='my-profile.html'">
  <img id="avatarImg" alt="Avatar">
  <span id="usernameDisplay">Username</span>
</div>

  <div class="header-icons">
  <i id="encryptionToggle" class="fa-solid fa-lock"></i>
  <i id="themeToggle" class="fa-solid fa-moon"></i>

  <div class="icon-wrapper">
    <i id="addFriendBtn" class="fa-solid fa-plus"></i>
    <span id="friendBadge" class="badge">0</span>
  </div>
</div>
</header>

<!-- CHAT LIST -->
<main id="chatList">
  <div class="chat-card">
    <img src="https://i.pravatar.cc/50?img=1">
    <div>
      <b>Alice</b>
      <p>Hey! Are you free tomorrow?</p>
    </div>
  </div>

  <div class="chat-card">
    <img src="https://i.pravatar.cc/50?img=2">
    <div>
      <b>Bob</b>
      <p>Sent the files.</p>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-item"><i class="fa-solid fa-circle-user"></i><span>Status</span></div>
  <div class="footer-item active"><i class="fa-solid fa-comment"></i><span>Chats</span></div>
  <div class="footer-item"><i class="fa-solid fa-upload"></i><span>Posts</span></div>
  <div class="footer-item" onclick="window.location.href='my-profile.html'">
    <i class="fa-solid fa-user"></i><span>Profile</span>
  </div>
  <div class="footer-item"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
</footer>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script type="module">
import { Auth } from "./session.js";

const API = "https://chatmate-kbwz.onrender.com/api/auth";

document.addEventListener("DOMContentLoaded", async () => {
  const addFriendBtn = document.getElementById("addFriendBtn");
  const badge = document.getElementById("friendBadge");
  const toggle = document.getElementById("themeToggle");
  const encryptionToggle = document.getElementById("encryptionToggle");
  const footer = document.querySelector("footer");

  let notificationCount = 0;
  let socket = null;
  let currentUserId = null;

  /* ========================= BADGE ========================= */
  function updateBadge() {
    badge.style.display = notificationCount > 0 ? "inline-block" : "none";
    badge.textContent = notificationCount || "";
  }

  /* ========================= REDIRECT ========================= */
  addFriendBtn.addEventListener("click", () => {
    notificationCount = 0;
    updateBadge();
    window.location.href = "friends.html";
  });

  /* ========================= THEME ========================= */
  toggle.onclick = () => {
    document.body.classList.toggle("dark");
    toggle.classList.toggle("fa-sun");
    toggle.classList.toggle("fa-moon");
  };

  /* ========================= ENCRYPTION ========================= */
  let encrypted = true;
  encryptionToggle.onclick = () => {
    encrypted = !encrypted;
    encryptionToggle.classList.toggle("fa-lock", encrypted);
    encryptionToggle.classList.toggle("fa-lock-open", !encrypted);
  };

  /* ========================= LOAD USER ========================= */
  async function loadUser() {
    const user = await Auth.getUser();

    if (!user) {
      // token missing/invalid → redirect
      window.location.href = "login.html";
      return;
    }

    currentUserId = user._id;

    // Display username and avatar
    document.getElementById("usernameDisplay").innerText =
      user.username || user.email;

    document.getElementById("avatarImg").src =
      user.avatarUrl ||
      "data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjRkZGIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgdmlld0JveD0iMCAwIDI0IDI0Ij48Y2lyY2xlIGN4PSIxMiIgY3k9IjgiIHI9IjQiLz48cGF0aCBkPSJNMTIgMTFjLTMuMyAwLTYgMi43LTYgNmgyMGMwLTMuMy0yLjctNi02LTZ6Ii8+PC9zdmc+";

    // 🔥 Start socket after user loads
    initSocket();
  }

  /* ========================= SOCKET.IO ========================= */
  function initSocket() {
    if (!currentUserId) return;

    socket = io("https://chatmate-kbwz.onrender.com");

    // join personal room
    socket.emit("join", currentUserId);

    console.log("Socket connected for user:", currentUserId);

    // Friend notifications
    socket.on("friend:new-request", () => { notificationCount++; updateBadge(); });
    socket.on("friend:accepted", () => { notificationCount++; updateBadge(); });
    socket.on("friend:update", () => { notificationCount++; updateBadge(); });
  }

  /* ========================= FOOTER HIDE/SHOW ========================= */
  let lastScroll = 0;
  window.addEventListener("scroll", () => {
    const currentScroll = window.pageYOffset;
    footer.classList.toggle("hide", currentScroll > lastScroll && currentScroll > 50);
    lastScroll = currentScroll;
  });

  /* ========================= INIT ========================= */
  loadUser(); // no await needed, DOM ready
});
</script>
</body>
</html>
