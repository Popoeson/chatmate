<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ChatMate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* =========================
   THEME VARIABLES
========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --input-border: #ccc;
  --btn-bg: #1C1C1E;
  --btn-text: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --input-bg: #2C2C2E;
  --btn-bg: #fff;
  --btn-text: #1C1C1E;
}

/* =========================
   BODY
========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* =========================
   HEADER
========================= */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

#themeToggle {
  cursor: pointer;
  font-size: 18px;
}

/* =========================
   CONTAINER & CARD
========================= */
.container {
  height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  padding: 30px;
  border-radius: 24px;
  text-align: center;
  transition: 0.3s;
  margin: 0 auto;
  background: var(--bg); /* light mode */
  box-shadow: 0 0 0 transparent; /* no shadow in light */
}

/* DARK MODE CARD - subtle lift with inset shadow */
body.dark .card {
  background: #1C1C1E;
  box-shadow:
    inset 0 0 15px rgba(255,255,255,0.05),
    0 15px 40px rgba(0,0,0,0.5);
}

/* =========================
   TITLE
========================= */
h2 {
  font-size: 30px;
  margin-bottom: 40px;
}

/* =========================
   INPUTS
========================= */
.input-group,
.password-wrap {
  width: 100%;
  max-width: 320px;
  margin: 0 auto 25px;
  position: relative;  /* ensures absolute icon is positioned correctly */
  display: block;
  box-sizing: border-box;
}

/* Dark mode inputs - underlined */
body.dark input {
  width: 100%;
  padding: 12px 40px 12px 0; /* extra right padding for icon */
  border: none;
  border-bottom: 1.5px solid #555;
  background: transparent;
  color: #fff;
  text-align: left;
  display: block;
  box-sizing: border-box;
}

/* Light mode inputs - underlined */
body:not(.dark) input {
  width: 100%;
  padding: 12px 40px 12px 0; /* extra right padding for icon */
  border: none;
  border-bottom: 1.5px solid var(--input-border);
  background: transparent;
  color: var(--text);
  text-align: left;
  display: block;
  box-sizing: border-box;
}

/* PASSWORD EYE ICON */
.input-group i {
  position: absolute;
  right: 0;               /* align to the right of input */
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  opacity: 0.7;
  font-size: 16px;        /* adjust size if needed */
}

body.dark .input-group i {
  color: #fff;
}

body:not(.dark) .input-group i {
  color: #1C1C1E;
}

.input-group i:hover {
  opacity: 1;
}

/* =========================
   OPTIONS FIXED
========================= */
.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  margin: 20px 0; 
  flex-wrap: nowrap; 
  gap: 20px;     
}

.checkbox-wrapper {
  display: flex;
  align-items: center;
  gap: 6px;         
  flex-shrink: 0;           
}

.checkbox-wrapper label {
  white-space: nowrap; 
}

.options a {
  text-decoration: none;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;  
}

/* SMALL MOBILE SCREENS */
@media (max-width: 360px) {
  .options {
    font-size: 13px;      
    gap: 12px;      
  }
}

@media (max-width: 300px) {
  .options {
    flex-direction: column; 
    align-items: flex-start;
    gap: 8px;
  }

  .options a {
    align-self: flex-end;  
  }
}

/* =========================
   BUTTONS (GLASS EFFECT)
========================= */
button {
  width: 100%;
  height: 30px;
  border-radius: 999px;
  border: none;
  margin-top: 40px;
  font-weight: 600;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  position: relative;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* =========================
   LOADER
========================= */
.loader {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader.active { display: inline-flex; }

.loader span {
  width: 6px;
  height: 6px;
  margin: 0 2px;
  background: var(--btn-text);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   FOOTER LINK
========================= */
.link {
  margin-top: 40px;
  font-size: 14px;
}

.link a {
  font-weight: bold;
  text-decoration: none;
  color: var(--text);
}

/* =========================
   MODAL (GLASS EFFECT)
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  width: 85%;
  max-width: 300px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
}

body:not(.dark) .modal-content { background: #fff; }

.modal-content button {
  margin-top: 20px;
  height: 45px;
  border-radius: 999px;
}

/* =========================
   HIDDEN CLASS
========================= */
.hidden { display: none; }

</style>
</head>

<body>

<header>
  <div><strong>ChatMate</strong></div>
  <div id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<div class="container">
  <div class="card">
    <h2>Login</h2>

    <!-- EMAIL -->
    <div class="input-group">
      <input type="text" id="identifier" placeholder="Email or Username">
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
      <i id="togglePassword" class="fa-solid fa-eye"></i>
    </div>

    <div class="options">
  <div class="checkbox-wrapper">
    <input type="checkbox" id="rememberMe">
    <label for="rememberMe">Remember Me</label>
  </div>
  <a href="password-reset.html">Forgot Password?</a>
</div>

    <button id="loginBtn">
      <span id="loginText">Login</span>
      <div id="loader" class="loader">
        <span></span><span></span><span></span>
      </div>
    </button>

    <div class="link">
      Not signed in? <a href="register.html">Register</a>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button id="modalOkBtn">OK</button>
  </div>
</div> 



<script type="module">
import { Auth } from "./session.js"; // Make sure the path is correct relative to this file

const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* THEME */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* PASSWORD TOGGLE */
const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

togglePassword.onclick = () => {
  const hidden = passwordInput.type === "password";
  passwordInput.type = hidden ? "text" : "password";
  togglePassword.classList.toggle("fa-eye");
  togglePassword.classList.toggle("fa-eye-slash");
};

/* MODAL 
function showModal(msg){
  document.getElementById("modalMessage").innerText = msg;
  document.getElementById("modal").style.display = "flex";
}
function closeModal(){
  document.getElementById("modalMessage").style.display = "none";
} */

/* =========================
   MODAL HELPERS
========================= */
const showModal = (msg) => {
  document.getElementById("modalMessage").innerText = msg;
  document.getElementById("modal").style.display = "flex";
};

const closeModal = () => {
  document.getElementById("modal").style.display = "none";
};

// ✅ attach event properly
document.getElementById("modalOkBtn").onclick = closeModal;

/* LOADING */
function setLoading(state){
  document.getElementById("loginText").style.display = state ? "none" : "inline";
  document.getElementById("loader").classList.toggle("active", state);
}

/* =========================  
   LOGIN  
========================= */  
document.getElementById("loginBtn").onclick = async () => {  
  const identifier = document.getElementById("identifier").value.trim();  
  const password = passwordInput.value.trim();  
  const rememberMe = document.getElementById("rememberMe").checked;  

  if(!identifier || !password){  
    showModal("All fields are required");  
    return;  
  }  

  if(password.length < 6){  
    showModal("Password must be at least 6 characters");  
    return;  
  }  

  setLoading(true);  

  try {  
    const res = await fetch(`${API}/login`, {  
      method: "POST",  
      headers: { "Content-Type": "application/json" },  
      body: JSON.stringify({ identifier, password })  
    });  

    const data = await res.json();  
    setLoading(false);  

    if(res.status === 429){  
      showModal("Too many attempts. Try again later.");  
      return;  
    }  

    if(!res.ok){  
      showModal(data.message || "Login failed");  
      return;  
    }  

    // 🔥 Use shared session.js to save token
    Auth.setToken(data.token, rememberMe);

    // Redirect to homepage
    window.location.href = "home.html";  

  } catch(err){  
    console.error(err);  
    setLoading(false);  
    showModal("Network error");  
  }  
};  
</script>

</body>
</html>
