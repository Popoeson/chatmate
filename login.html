<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ChatMate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* =========================
   THEME SYSTEM
========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --input-border: #ccc;
  --btn-bg: #1C1C1E;
  --btn-text: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --input-bg: #3A3A3C;
  --btn-bg: #fff;
  --btn-text: #1C1C1E;
}

/* ========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* =========================
   HEADER
========================= */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

#themeToggle {
  cursor: pointer;
  font-size: 18px;
}

/* =========================
   LAYOUT
========================= */
.container {
  height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* DARK MODE CARD */
.card {
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 24px;
  text-align: center;
  transition: 0.3s;
}

body.dark .card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

body:not(.dark) .card {
  background: transparent;
}

/* =========================
   TITLE
========================= */
h2 {
  font-size: 30px;
  margin-bottom: 40px;
}

/* =========================
   INPUTS
========================= */
.input-group,
.password-wrap {
  width: 100%;
  max-width: 320px;        /* optional cap for mobile screens */
  margin: 0 auto 25px;     /* center horizontally and space below */
  position: relative;
  display: block;
  box-sizing: border-box;  /* include padding in width */
}

/* DARK MODE INPUT */
body.dark input {
  width: 100%;
  padding: 14px 16px;      /* consistent padding for text + icon */
  border-radius: 12px;
  border: none;
  background: var(--input-bg);
  color: #fff;
  text-align: left;        /* text starts from left */
  display: block;
  box-sizing: border-box;
}

/* LIGHT MODE INPUT */
body:not(.dark) input {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1.5px solid var(--input-border);
  background: transparent;
  color: var(--text);
  text-align: left;
  display: block;
  box-sizing: border-box;
}

/* PASSWORD EYE ICON */
.password-wrap i {
  position: absolute;
  right: 16px;            /* align with input padding */
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text);
  opacity: 0.7;
}

.password-wrap i:hover {
  opacity: 1;
}

input:focus {
  outline: none;
}

/* PASSWORD ICON */
.input-group i {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  opacity: 0.6;
}

body.dark .input-group i {
  color: #fff;
}

body:not(.dark) .input-group i {
  color: #1C1C1E;
}

/* =========================
   OPTIONS
========================= */
.options {
  display: flex;
  justify-content: space-between;
  align-items: center; /* vertical center alignment */
  font-size: 14px;
  margin-top: 10px;
}

/* Checkbox + text inline */
.checkbox-wrapper {
  display: flex;
  align-items: center;
  gap: 3px; /* space between checkbox and text */
}

.options a {
  text-decoration: none;
  font-weight: 600;
  color: var(--text);
}

/* =========================
   BUTTON
========================= */
button {
  width: 100%;
  height: 55px;
  border-radius: 999px;
  border: none;
  margin-top: 40px;
  font-weight: 600;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  position: relative;
}

/* =========================
   LOADER
========================= */
.loader {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader.active {
  display: inline-flex;
}

.loader span {
  width: 6px;
  height: 6px;
  margin: 0 2px;
  background: var(--btn-text);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   FOOTER LINK
========================= */
.link {
  margin-top: 40px;
  font-size: 14px;
}

.link a {
  font-weight: bold;
  text-decoration: none;
  color: var(--text);
}

/* =========================
   MODAL (REFINED)
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  width: 85%;
  max-width: 300px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(20px);
}

body.dark .modal-content {
  background: rgba(255,255,255,0.08);
}

body:not(.dark) .modal-content {
  background: #fff;
}

.modal-content button {
  margin-top: 20px;
  height: 45px;
  border-radius: 999px;
}
</style>
</head>

<body>

<header>
  <div><strong>ChatMate</strong></div>
  <div id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<div class="container">
  <div class="card">
    <h2>Login</h2>

    <!-- EMAIL -->
    <div class="input-group">
      <input type="text" id="identifier" placeholder="Email or Username">
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
      <i id="togglePassword" class="fa-solid fa-eye"></i>
    </div>

    <div class="options">
  <div class="checkbox-wrapper">
    <input type="checkbox" id="rememberMe">
    <label for="rememberMe">Remember Me</label>
  </div>
  <a href="#">Forgot Password?</a>
</div>

    <button id="loginBtn">
      <span id="loginText">Login</span>
      <div id="loader" class="loader">
        <span></span><span></span><span></span>
      </div>
    </button>

    <div class="link">
      Not signed in? <a href="register.html">Register</a>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* THEME */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* PASSWORD TOGGLE */
const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

togglePassword.onclick = () => {
  const hidden = passwordInput.type === "password";
  passwordInput.type = hidden ? "text" : "password";
  togglePassword.classList.toggle("fa-eye");
  togglePassword.classList.toggle("fa-eye-slash");
};

/* MODAL */
function showModal(msg){
  document.getElementById("modalMessage").innerText = msg;
  document.getElementById("modal").style.display = "flex";
}
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* LOADING */
function setLoading(state){
  document.getElementById("loginText").style.display = state ? "none" : "inline";
  document.getElementById("loader").classList.toggle("active", state);
}

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{
  const identifier = document.getElementById("identifier").value.trim();
  const password = passwordInput.value.trim();
  const rememberMe = document.getElementById("rememberMe").checked;

  if(!identifier || !password){
    showModal("All fields are required");
    return;
  }

  setLoading(true);

  try{
    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ identifier, password })
    });

    const data = await res.json();
    setLoading(false);

    if(res.status === 429){
      showModal("Too many attempts. Try again later.");
      return;
    }

    if(!res.ok){
      showModal(data.message || "Login failed");
      return;
    }

    if(rememberMe){
      localStorage.setItem("token", data.token);
    } else {
      sessionStorage.setItem("token", data.token);
    }

    window.location.href = "home.html";

  }catch(err){
    setLoading(false);
    showModal("Network error");
  }
};
</script>

</body>
</html>
