<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - ChatMate</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

/* =========================
   THEME
========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --input-border: #ccc;
  --btn-bg: #1C1C1E;
  --btn-text: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --input-border: #555;
  --btn-bg: #fff;
  --btn-text: #1C1C1E;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* =========================
   HEADER
========================= */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
}

.header-icons {
  display: flex;
  gap: 15px;
  cursor: pointer;
}

/* =========================
   CARD
========================= */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: calc(100vh - 80px);
}

.card {
  width: 100%;
  max-width: 380px;
  padding: 30px;
  border-radius: 24px;
  text-align: center;
}

body.dark .card {
  background: #1C1C1E;
  box-shadow:
    inset 0 0 15px rgba(255,255,255,0.05),
    0 15px 40px rgba(0,0,0,0.5);
}

/* =========================
   AVATAR
========================= */
.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
  margin-bottom: 20px;
  display: none; /* hidden until loaded */
}

/* =========================
   INPUTS
========================= */
.input-group {
  margin-bottom: 20px;
  text-align: left;
}

.input-group input,
.input-group textarea {
  width: 100%;
  border: none;
  border-bottom: 1.5px solid var(--input-border);
  padding: 10px 0;
  background: transparent;
  color: var(--text);
}

.read-only input,
.read-only textarea {
  pointer-events: none;
}

/* =========================
   BUTTONS
========================= */
button {
  width: 100%;
  height: 40px;
  border-radius: 999px;
  border: none;
  margin-top: 20px;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
}

.hidden {
  display: none;
}

/* =========================
   MODAL
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal img {
  width: 80%;
  max-width: 300px;
  border-radius: 20px;
}

  /* =========================
     FOOTER NAVIGATION
  ========================= */
  footer {
    position: sticky;
    bottom: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0;
    background: linear-gradient(to right, #2B2E33, #7B7F85);
    color: #fff;
  }
  .footer-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 0.75rem;
    cursor: pointer;
    color: #fff;
    transition: color 0.2s;
  }
  .footer-item i {
    font-size: 1.3rem;
    margin-bottom: 4px;
  }
  .footer-item.active {
    color: #4caf50;
  }

</style>

</style>
</head>

<body>

<header>
  <div><b>ChatMate</b></div>
  <div class="header-icons">
    <i id="themeToggle" class="fa-solid fa-moon"></i>
    <i id="editToggle" class="fa-solid fa-pen"></i>
  </div>
</header>

<div class="container">
  <div class="card read-only" id="profileContainer">

    <img id="avatarPreview" class="avatar">

    <input type="file" id="avatarInput" class="hidden">

    <div class="input-group">
      <label>Username</label>
      <input id="username" placeholder="Username">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input id="email" placeholder="Email">
    </div>

    <div class="input-group">
       <label>Phone No.</label>
      <input id="phone" placeholder="Phone">
    </div>

    <div class="input-group">
      <label>Bio</label>
      <textarea id="bio" placeholder="Bio"></textarea>
    </div>

    <button id="saveBtn" class="hidden">Save Changes</button>
    <button id="cancelBtn" class="hidden">Cancel</button>

  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="modal">
  <img id="modalImg">
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-item"><i class="fa-solid fa-circle-user"></i><span>Status</span></div>

  <div class="footer-item" onclick="window.location.href='home.html'">
    <i class="fa-solid fa-comment"></i><span>Chats</span>
  </div>

   <!-- <div class="footer-item">
      <a href="home.html" class="footer-item">
  <i class="fa-solid fa-comment"></i>
  <span>Chats</span>
</a>
  </div> -->

  <div class="footer-item"><i class="fa-solid fa-upload"></i><span>Posts</span></div>

  <div class="footer-item active"><i class="fa-solid fa-user"></i><span>Profile</span></div>

  <div class="footer-item"><i class="fa-solid fa-gear"></i><span>Settings</span></div>

</footer>

<script type="module">
import { Auth } from "./session.js"; // 🔥 shared session helper
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* ========================= THEME ========================= */
themeToggle.onclick = () => {
  document.body.classList.toggle("dark");
};

/* ========================= TOKEN CHECK ========================= */
const token = Auth.getToken(); // 🔥 get token from session helper
if (!token) {
  window.location.href = "login.html";
}

/* ========================= LOAD PROFILE ========================= */
async function loadProfile() {
  try {
    const res = await fetch(`${API}/me`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!res.ok) {
      Auth.clearToken(); // 🔥 clear invalid token
      return window.location.href = "login.html";
    }

    const data = await res.json();
    if (!data.user) return;

    const user = data.user;

    username.value = user.username || "";
    email.value = user.email || "";
    phone.value = user.phone || "";
    bio.value = user.bio || "";

    if (user.avatarUrl) {
      avatarPreview.src = user.avatarUrl;
      avatarPreview.style.display = "block";
    }

  } catch (err) {
    console.error(err);
    Auth.clearToken();
    window.location.href = "login.html";
  }
}

/* ========================= EDIT MODE ========================= */
let editing = false;

editToggle.onclick = () => {
  editing = true;
  profileContainer.classList.remove("read-only");

  saveBtn.classList.remove("hidden");
  cancelBtn.classList.remove("hidden");
  avatarInput.classList.remove("hidden");
};

cancelBtn.onclick = () => {
  editing = false;
  profileContainer.classList.add("read-only");

  saveBtn.classList.add("hidden");
  cancelBtn.classList.add("hidden");
  avatarInput.classList.add("hidden");

  loadProfile();
};

/* ========================= SAVE PROFILE ========================= */
saveBtn.onclick = async () => {
  const formData = new FormData();
  formData.append("username", username.value);
  formData.append("email", email.value);
  formData.append("phone", phone.value);
  formData.append("bio", bio.value);

  const file = avatarInput.files[0];
  if (file) formData.append("avatar", file);

  try {
    const res = await fetch(`${API}/update-profile`, {
      method: "POST",
      headers: { Authorization: `Bearer ${Auth.getToken()}` }, // 🔥 use session helper
      body: formData
    });

    const data = await res.json();

    if (data.newToken) {
      Auth.setToken(data.newToken); // 🔥 update token in correct storage
    }

    cancelBtn.onclick(); // exit edit mode
  } catch (err) {
    console.error(err);
  }
};

/* ========================= AVATAR PREVIEW + MODAL ========================= */
avatarPreview.onclick = () => {
  if (editing) {
    avatarInput.click();
  } else {
    modalImg.src = avatarPreview.src;
    imageModal.style.display = "flex";
  }
};

imageModal.onclick = () => {
  imageModal.style.display = "none";
};

/* ========================= FILE INPUT PREVIEW ========================= */
avatarInput.onchange = e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = () => {
      avatarPreview.src = reader.result;
      avatarPreview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
};

/* ========================= INIT ========================= */
loadProfile();
</script>
</body>
</html>
