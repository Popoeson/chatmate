<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - ChatMate</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
/* =========================
   GLOBAL
========================= */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f9f9f9;
  color: #111;
  transition: 0.3s;
}
body.dark {
  background: #111;
  color: #fff;
}

/* =========================
   HEADER
========================= */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
  color: #fff;
}
.logo { font-size: 1.5rem; font-weight: bold; }

.header-icons {
  display: flex;
  gap: 16px;
  font-size: 1.2rem;
  cursor: pointer;
}
.header-icons i:hover {
  transform: scale(1.1);
}

/* =========================
   PROFILE
========================= */
.container {
  padding: 20px;
  text-align: center;
}

.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
}

.input-group {
  margin: 15px 0;
  text-align: left;
}

.input-group label {
  font-size: 0.8rem;
  opacity: 0.7;
}

.input-group input,
.input-group textarea {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
  background: transparent;
  color: inherit;
}

body.dark input,
body.dark textarea {
  border-bottom: 1px solid #555;
}

input:focus, textarea:focus { outline: none; }

/* READ MODE */
.read-only input,
.read-only textarea {
  border: none;
  pointer-events: none;
}

/* =========================
   BUTTON
========================= */
.save-btn {
  margin-top: 20px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #1C1C1E;
  color: #fff;
  cursor: pointer;
}
body.dark .save-btn {
  background: #fff;
  color: #1C1C1E;
}

/* =========================
   FOOTER
========================= */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  background: linear-gradient(to right, #2B2E33, #7B7F85);
  color: #fff;
}

.footer-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 0.75rem;
  cursor: pointer;
}

.footer-item i {
  font-size: 1.3rem;
}

.footer-item.active {
  color: #4caf50;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">ChatMate</div>
  <div class="header-icons">
    <i id="themeToggle" class="fa-solid fa-moon"></i>
    <i id="editToggle" class="fa-solid fa-pen"></i>
  </div>
</header>

<!-- PROFILE -->
<div class="container read-only" id="profileContainer">
  <img id="avatarPreview" class="avatar" src="default-avatar.png" alt="Profile Picture">
  <input type="file" id="avatarInput" class="hidden">

  <div class="input-group">
    <label>Username</label>
    <input id="username">
  </div>

  <div class="input-group">
    <label>Email</label>
    <input id="email">
  </div>

  <div class="input-group">
    <label>Phone</label>
    <input id="phone">
  </div>

  <div class="input-group">
    <label>Bio</label>
    <textarea id="bio"></textarea>
  </div>

  <button id="saveBtn" class="save-btn hidden">Save Changes</button>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-item"><i class="fa-solid fa-circle-user"></i><span>Status</span></div>
  <div class="footer-item"><i class="fa-solid fa-comment"></i><span>Chats</span></div>
  <div class="footer-item"><i class="fa-solid fa-upload"></i><span>Posts</span></div>
  <div class="footer-item active"><i class="fa-solid fa-user"></i><span>Profile</span></div>
  <div class="footer-item"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
</footer>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* =========================
   THEME TOGGLE
========================= */
const toggle = document.getElementById("themeToggle");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  toggle.classList.toggle("fa-sun");
  toggle.classList.toggle("fa-moon");
};

/* =========================
   TOKEN CHECK
========================= */
const token = localStorage.getItem("token") || sessionStorage.getItem("token");

if(!token){
  alert("You are not logged in. Redirecting to login page.");
  window.location.href = "login.html";
} else {
  console.log("Token available on my-profile page:", token);
}

/* =========================
   LOAD PROFILE
========================= */
async function loadProfile(){
  try{
    const token = localStorage.getItem("token") || sessionStorage.getItem("token");
    if(!token){
      alert("Not logged in");
      window.location.href = "login.html";
      return;
    }

    const res = await fetch(`${API}/me`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();
    console.log("PROFILE RESPONSE:", data);

    if(!res.ok){
      console.warn("Failed to load profile:", data.message);
      return;
    }

    const user = data.user;
    if(!user) return;

    // Update avatar
    const avatarImg = document.getElementById("avatarPreview");
    if(avatarImg) avatarImg.src = user.avatarUrl || "default-avatar.png";

    // Update other fields
    document.getElementById("username")?.value = user.username || "";
    document.getElementById("email")?.value = user.email || "";
    document.getElementById("phone")?.value = user.phone || "";
    document.getElementById("bio")?.value = user.bio || "";

  } catch(err){
    console.error("LOAD PROFILE ERROR:", err);
  }
}

/* =========================
   EDIT TOGGLE
========================= */
let editing = false;
const container = document.getElementById("profileContainer");
const saveBtn = document.getElementById("saveBtn");
const editToggleBtn = document.getElementById("editToggle");

editToggleBtn?.addEventListener("click", () => {
  editing = !editing;
  if(editing){
    container?.classList.remove("read-only");
    saveBtn?.classList.remove("hidden");
  } else {
    container?.classList.add("read-only");
    saveBtn?.classList.add("hidden");
  }
});

/* =========================
   SAVE PROFILE
========================= */
saveBtn?.addEventListener("click", async () => {
  try{
    const token = localStorage.getItem("token") || sessionStorage.getItem("token");
    if(!token) return alert("Not logged in");

    const formData = new FormData();
    const usernameEl = document.getElementById("username");
    const emailEl = document.getElementById("email");
    const phoneEl = document.getElementById("phone");
    const bioEl = document.getElementById("bio");

    if(usernameEl) formData.append("username", usernameEl.value);
    if(emailEl) formData.append("email", emailEl.value);
    if(phoneEl) formData.append("phone", phoneEl.value);
    if(bioEl) formData.append("bio", bioEl.value);

    const file = document.getElementById("avatarInput")?.files[0];
    if(file) formData.append("avatar", file);

    const res = await fetch(`${API}/update-profile`, {
      method: "POST",
      headers: { Authorization: `Bearer ${token}` },
      body: formData
    });

    const data = await res.json();

    if(!res.ok) return alert(data.message || "Error updating profile");

    if(data.newToken) localStorage.setItem("token", data.newToken);

    alert("Profile updated successfully!");
    editing = false;
    container?.classList.add("read-only");
    saveBtn?.classList.add("hidden");

  } catch(err){
    console.error("SAVE PROFILE ERROR:", err);
    alert("Something went wrong while saving profile");
  }
});

/* =========================
   AVATAR PREVIEW
========================= */
const avatarInput = document.getElementById("avatarInput");
const avatarPreview = document.getElementById("avatarPreview");

if(avatarInput && avatarPreview){
  avatarInput.onchange = e => {
    const file = e.target.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = () => avatarPreview.src = reader.result;
      reader.readAsDataURL(file);
    }
  };
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", () => {
  loadProfile();
});
</script>
</body>
</html>
