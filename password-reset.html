<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - ChatMate</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* =========================
   THEME VARIABLES
========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --input-border: #ccc;
  --btn-bg: #1C1C1E;
  --btn-text: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --input-bg: #2C2C2E;
  --btn-bg: #fff;
  --btn-text: #1C1C1E;
}

/* =========================
   BODY
========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* =========================
   HEADER / THEME TOGGLE
========================= */
#themeToggle {
  position: fixed;
  top: 20px;
  right: 20px;
  cursor: pointer;
  font-size: 20px;
}

/* =========================
   CONTAINER & CARD
========================= */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  padding: 30px;
  border-radius: 24px;
  text-align: center;
  transition: 0.3s;
  margin: 0 auto;
  background: var(--bg);
  box-shadow: 0 0 0 transparent;
}

body.dark .card {
  background: var(--bg);
  box-shadow:
    inset 0 0 15px rgba(255,255,255,0.05),
    0 15px 40px rgba(0,0,0,0.5);
}

/* =========================
   TITLE
========================= */
h2 {
  font-size: 30px;
  margin-bottom: 40px;
}

/* =========================
   INPUTS
========================= */
.input-group, .password-wrap {
  width: 100%;
  max-width: 320px;
  margin: 0 auto 25px;
  position: relative;
  display: block;
  box-sizing: border-box;
}

body.dark input {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1.5px solid #555;
  background: transparent;
  color: #fff;
  text-align: left;
}

body:not(.dark) input {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1.5px solid var(--input-border);
  background: transparent;
  color: var(--text);
  text-align: left;
}

.password-wrap i {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text);
  opacity: 0.7;
}
.password-wrap i:hover { opacity: 1; }
input:focus { outline: none; }

/* =========================
   BUTTONS (GLASS EFFECT)
========================= */
button {
  width: 100%;
  height: 40px;
  border-radius: 999px;
  border: none;
  margin-top: 20px;
  font-weight: 600;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  position: relative;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: 0.3s;
}

/* =========================
   LOADER
========================= */
.loader {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.loader.active { display: inline-flex; }
.loader span {
  width: 6px;
  height: 6px;
  margin: 0 2px;
  background: var(--btn-text);
  border-radius: 50%;
  animation: bounce 1s infinite;
}
.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }
@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   MODAL (GLASS EFFECT)
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}
.modal-content {
  width: 85%;
  max-width: 300px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
}
body:not(.dark) .modal-content { background: #fff; }
.modal-content button {
  margin-top: 20px;
  height: 45px;
  border-radius: 999px;
}

/* =========================
   HIDDEN
========================= */
.hidden { display: none; }
</style>
</head>
<body>

<div id="themeToggle"><i class="fa fa-moon"></i></div>

<div class="container">
  <div class="card">
    <h2>Forgot Password</h2>

    <!-- Email State -->
    <div id="emailState">
      <div class="input-group">
        <input type="email" id="email" placeholder="Enter your email" />
      </div>
      <button id="requestOtpBtn">
        <span id="requestOtpText">Send OTP</span>
        <div id="requestOtpLoader" class="loader"><span></span><span></span><span></span></div>
      </button>
    </div>

    <!-- OTP State -->
    <div id="otpState" class="hidden">
      <div class="input-group">
        <input type="text" id="otp" placeholder="Enter OTP" />
      </div>
      <button id="verifyOtpBtn">
        <span id="verifyOtpText">Verify OTP</span>
        <div id="verifyOtpLoader" class="loader"><span></span><span></span><span></span></div>
      </button>
    </div>

    <!-- New Password State -->
    <div id="newPasswordState" class="hidden">
      <div class="password-wrap">
        <input type="password" id="newPassword" placeholder="New Password" />
        <i class="fa fa-eye" id="toggleNewPassword"></i>
      </div>
      <div class="password-wrap">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" />
        <i class="fa fa-eye" id="toggleConfirmPassword"></i>
      </div>
      <button id="updatePasswordBtn">
        <span id="updatePasswordText">Update Password</span>
        <div id="updatePasswordLoader" class="loader"><span></span><span></span><span></span></div>
      </button>
    </div>

  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button>OK</button>
  </div>
</div>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* THEME TOGGLE */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* PASSWORD TOGGLE */
function togglePassword(inputId, iconId){
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  icon.onclick = () => {
    const hidden = input.type === "password";
    input.type = hidden ? "text" : "password";
    icon.classList.toggle("fa-eye");
    icon.classList.toggle("fa-eye-slash");
  };
}
togglePassword("newPassword","toggleNewPassword");
togglePassword("confirmPassword","toggleConfirmPassword");

/* MODAL */
function showModal(msg, onClose=null){
  const modal = document.getElementById("modal");
  document.getElementById("modalMessage").innerText = msg;
  modal.style.display = "flex";
  const okBtn = modal.querySelector("button");
  const closeHandler = ()=>{
    closeModal();
    if(onClose) onClose();
    okBtn.removeEventListener("click", closeHandler);
  };
  okBtn.addEventListener("click", closeHandler);
}
function closeModal(){ document.getElementById("modal").style.display = "none"; }
document.getElementById("modal").onclick = e => { if(e.target.id === "modal") closeModal(); };

/* LOADING HELPER */
function setLoading(isLoading, btnId, loaderId, textId){
  document.getElementById(btnId).disabled = isLoading;
  document.getElementById(loaderId).classList.toggle("active", isLoading);
  document.getElementById(textId).classList.toggle("hidden", isLoading);
}

/* =========================
   FORGOT PASSWORD FLOW
========================= */
let currentUserEmail = "";

// STEP 1: Request OTP
document.getElementById("requestOtpBtn").onclick = async () => {
  const email = document.getElementById("email").value.trim();
  if(!email) return showModal("Please enter your email");
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showModal("Invalid email format");

  setLoading(true, "requestOtpBtn","requestOtpLoader","requestOtpText");
  try{
    const res = await fetch(`${API}/forgot-password`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    setLoading(false, "requestOtpBtn","requestOtpLoader","requestOtpText");

    if(!res.ok) return showModal(data.message || "Error sending OTP");

    currentUserEmail = email;
    showModal("OTP sent! Check your email.", ()=>{
      document.getElementById("emailState").classList.add("hidden");
      document.getElementById("otpState").classList.remove("hidden");
    });
  }catch(err){
    setLoading(false, "requestOtpBtn","requestOtpLoader","requestOtpText");
    console.error(err);
    showModal("Network error");
  }
};

// STEP 2: Verify OTP
document.getElementById("verifyOtpBtn").onclick = async () => {
  const otp = document.getElementById("otp").value.trim();
  if(!otp || !/^\d{6}$/.test(otp)) return showModal("Enter valid 6-digit OTP");

  setLoading(true,"verifyOtpBtn","verifyOtpLoader","verifyOtpText");
  try{
    const res = await fetch(`${API}/verify-reset-otp`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email: currentUserEmail, otp })
    });
    const data = await res.json();
    setLoading(false,"verifyOtpBtn","verifyOtpLoader","verifyOtpText");

    if(!res.ok) return showModal(data.message || "Invalid OTP");

    showModal("OTP verified!", ()=>{
      document.getElementById("otpState").classList.add("hidden");
      document.getElementById("newPasswordState").classList.remove("hidden");
    });
  }catch(err){
    setLoading(false,"verifyOtpBtn","verifyOtpLoader","verifyOtpText");
    console.error(err);
    showModal("Network error");
  }
};

// STEP 3: Update Password
document.getElementById("updatePasswordBtn").onclick = async () => {
  const password = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  if(!password || !confirm) return showModal("Enter password and confirm password");
  if(password.length < 6) return showModal("Password must be at least 6 characters");
  if(password !== confirm) return showModal("Passwords do not match");

  setLoading(true,"updatePasswordBtn","updatePasswordLoader","updatePasswordText");
  try{
    const res = await fetch(`${API}/reset-password`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email: currentUserEmail, newPassword: password })
    });
    const data = await res.json();
    setLoading(false,"updatePasswordBtn","updatePasswordLoader","updatePasswordText");

    if(!res.ok) return showModal(data.message || "Failed to update password");
    showModal("Password updated successfully!", ()=> window.location.href="login.html");
  }catch(err){
    setLoading(false,"updatePasswordBtn","updatePasswordLoader","updatePasswordText");
    console.error(err);
    showModal("Network error");
  }
};
</script>
</body>
</html>
