<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Profile | ChatMate</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* =========================
   THEME VARIABLES
========================= */
:root {
  --bg: #F5F6F7;
  --surface: #7B7F85;
  --accent: #2B2E33;
  --text: #2B2E33;
}

body.dark {
  --bg: #2B2E33;
  --surface: #7B7F85;
  --accent: #F5F6F7;
  --text: #F5F6F7;
}

/* =========================
   BASE STYLES
========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.logo { font-weight: bold; font-size: 20px; }
.theme-toggle { cursor: pointer; font-size: 20px; }

.container {
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  width: 400px;
  padding: 25px;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card h2 { margin-bottom: 20px; }

input {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: left;
}

textarea {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  resize: none;
  text-align: left;
}

button {
  width: 95%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
  font-weight: bold;
  position: relative;
}

.loader {
  display: inline-flex;
  gap: 5px;
  justify-content: center;
  align-items: center;
}

.loader span {
  width: 6px;
  height: 6px;
  background: var(--bg);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

.hidden { display: none; }

/* =========================
   AVATAR & TOGGLE
========================= */
#avatarPreview {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
  border: 2px solid var(--accent);
}

.toggle-switch {
  display: inline-block;
  position: relative;
  width: 50px;
  height: 24px;
  margin-left: 10px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #ccc;
  border-radius: 24px;
  top: 0; left: 0; right: 0; bottom: 0;
  transition: 0.4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px; width: 18px;
  left: 3px; bottom: 3px;
  background-color: white;
  border-radius: 50%;
  transition: 0.4s;
}

input:checked + .slider {
  background-color: var(--accent);
}

input:checked + .slider:before {
  transform: translateX(26px);
}

/* =========================
   LINKS
========================= */
.link-item {
  display: flex;
  gap: 5px;
  margin-bottom: 5px;
}

.link-item input {
  flex: 1;
}

.link-item button {
  width: auto;
  padding: 6px 10px;
  margin: 0;
}

#addLinkBtn {
  width: auto;
  padding: 10px 15px;
  margin-top: 5px;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">ChatMate</div>
  <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<!-- MAIN -->
<div class="container">
  <div class="card">
    <h2>Complete Your Profile</h2>

    <!-- AVATAR -->
    <img id="avatarPreview" src="default-avatar.png" alt="Avatar Preview">
    <input type="file" id="avatarInput" accept="image/*">

    <!-- PHONE -->
    <input type="text" id="phone" placeholder="Phone Number">

    <!-- USERNAME -->
    <input type="text" id="username" placeholder="Username">

    <!-- ABOUT / BIO -->
    <textarea id="bio" rows="3" placeholder="About / Bio (max 150 chars)" maxlength="150"></textarea>

    <!-- LAST SEEN TOGGLE -->
    <div style="margin:10px 0; display:flex; align-items:center;">
      <span>Show Last Seen</span>
      <label class="toggle-switch">
        <input type="checkbox" id="lastSeenToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- LINKS -->
    <div id="linksContainer"></div>
    <button type="button" id="addLinkBtn">Add Link</button>

    <!-- SAVE BUTTON -->
    <button id="saveProfileBtn">
      <span id="saveProfileText">Save Profile</span>
      <div id="saveProfileLoader" class="loader hidden">
        <span></span><span></span><span></span>
      </div>
    </button>
  </div>
</div>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* THEME TOGGLE */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* AVATAR PREVIEW */
document.getElementById("avatarInput").onchange = (e)=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = () => { document.getElementById("avatarPreview").src = reader.result; };
    reader.readAsDataURL(file);
  }
};

/* DYNAMIC LINKS */
document.getElementById("addLinkBtn").onclick = ()=>{
  const container = document.getElementById("linksContainer");
  const div = document.createElement("div");
  div.className = "link-item";
  div.innerHTML = `
    <input type="url" class="linkInput" placeholder="Enter link">
    <button type="button" onclick="this.parentElement.remove()">Remove</button>
  `;
  container.appendChild(div);
};
function getLinksArray(){
  return Array.from(document.querySelectorAll(".linkInput"))
              .map(input=>input.value.trim())
              .filter(url=>url.length>0);
}

/* LOADING HELPER */
function setLoading(isLoading){
  const btn = document.getElementById("saveProfileBtn");
  const text = document.getElementById("saveProfileText");
  const loader = document.getElementById("saveProfileLoader");
  text.classList.toggle("hidden", isLoading);
  loader.classList.toggle("hidden", !isLoading);
  btn.disabled = isLoading;
}

/* SAVE PROFILE */
document.getElementById("saveProfileBtn").onclick = async ()=>{
  const phone = document.getElementById("phone").value.trim();
  const username = document.getElementById("username").value.trim();
  const bio = document.getElementById("bio").value.trim();
  const avatarFile = document.getElementById("avatarInput").files[0];
  const lastSeenVisible = document.getElementById("lastSeenToggle").checked;
  const links = getLinksArray();

  // VALIDATION
  if(!phone || !username){
    alert("Phone and Username are required.");
    return;
  }

  setLoading(true);

  let avatarUrl = document.getElementById("avatarPreview").src; // default or base64
  // Here you can upload avatarFile to Cloudinary if file selected
  // Then set avatarUrl to Cloudinary returned URL

  try{
    const res = await fetch(`${API}/update-profile`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        phone, username, bio, avatarUrl, lastSeenVisible, links
      })
    });

    const data = await res.json();
    setLoading(false);

    if(!res.ok){
      alert(data.message || "Failed to save profile");
      return;
    }

    window.location.href="home.html";

  }catch(err){
    console.error(err);
    setLoading(false);
    alert("Network error");
  }
};
</script>
</body>
</html>
