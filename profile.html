<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Profile | ChatMate</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* =========================
   THEME SYSTEM
========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --input-border: #ccc;
  --btn-bg: #1C1C1E;
  --btn-text: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --btn-bg: #fff;
  --btn-text: #1C1C1E;
}

/* =========================
   BASE
========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* =========================
   HEADER
========================= */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

#themeToggle {
  cursor: pointer;
  font-size: 18px;
}

/* =========================
   LAYOUT
========================= */
.container {
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  padding: 30px;
  text-align: center;
}

/* =========================
   TITLE
========================= */
h2 {
  font-size: 30px;
  margin-bottom: 30px;
}

/* =========================
   INPUTS (UNDERLINE STYLE)
========================= */
.input-group,
textarea {
  width: 100%;
  max-width: 320px;
  margin: 0 auto 20px;
  display: block;
}

/* ALL INPUTS */
input,
textarea {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1.5px solid var(--input-border);
  background: transparent;
  color: var(--text);
  text-align: left;
  box-sizing: border-box;
}

body.dark input,
body.dark textarea {
  border-bottom: 1.5px solid #555;
  color: #fff;
}

input:focus,
textarea:focus {
  outline: none;
}

/* READONLY STYLE */
input[readonly] {
  opacity: 0.6;
}

/* =========================
   AVATAR
========================= */
#avatarPreview {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
}

/* =========================
   TOGGLE
========================= */
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 320px;
  margin: 15px auto;
}

.toggle-switch {
  position: relative;
  width: 50px;
  height: 24px;
}

.toggle-switch input {
  opacity: 0;
}

.slider {
  position: absolute;
  inset: 0;
  background: #ccc;
  border-radius: 24px;
  transition: 0.3s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: var(--btn-bg);
}

input:checked + .slider:before {
  transform: translateX(26px);
}

/* =========================
   LINKS
========================= */
.link-item {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.link-item input {
  flex: 1;
}

.link-item button {
  width: auto;
  height: 40px;
  padding: 0 12px;
}

/* =========================
   BUTTON (GLASS)
========================= */
button {
  width: 100%;
  height: 30px;
  border-radius: 999px;
  border: none;
  margin-top: 30px;
  font-weight: 600;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  position: relative;

  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* =========================
   LOADER
========================= */
.loader {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader.active {
  display: inline-flex;
}

.loader span {
  width: 6px;
  height: 6px;
  margin: 0 2px;
  background: var(--btn-text);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   MODAL (GLASS)
========================= */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  width: 85%;
  max-width: 300px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;

  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
}

body:not(.dark) .modal-content {
  background: #fff;
}

.modal-content button {
  margin-top: 20px;
  height: 45px;
}

/* ========================= */
.hidden { display: none; }

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">ChatMate</div>
  <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<!-- MAIN -->
<div class="container">
  <div class="card">
    <h2>Complete Your Profile</h2>

    <!-- AVATAR -->
    <img id="avatarPreview" src="default-avatar.png" alt="Avatar Preview">
    <input type="file" id="avatarInput" accept="image/*">

    <!-- PHONE -->
    <input type="text" id="phone" placeholder="Phone Number" readonly>
    
     <!-- EMAIL -->
    <input type="mail" id="email" placeholder="example@mail.com" readonly>

    <!-- USERNAME -->
    <input type="text" id="username" placeholder="Username">

    <!-- ABOUT / BIO -->
    <textarea id="bio" rows="3" placeholder="About / Bio (max 150 chars)" maxlength="150"></textarea>

    <!-- LAST SEEN TOGGLE -->
    <div style="margin:10px 0; display:flex; align-items:center;">
      <span>Show Last Seen</span>
      <label class="toggle-switch">
        <input type="checkbox" id="lastSeenToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- LINKS -->
    <div id="linksContainer"></div>
    <button type="button" id="addLinkBtn">Add Link</button>

    <!-- SAVE BUTTON -->
    <button id="saveProfileBtn">
      <span id="saveProfileText">Save Profile</span>
      <div id="saveProfileLoader" class="loader hidden">
        <span></span><span></span><span></span>
      </div>
    </button>
  </div>
</div>


<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* =========================
   ELEMENT REFERENCES
========================= */
const phoneInput = document.getElementById("phone");
const emailInput = document.getElementById("email");
const usernameInput = document.getElementById("username");
const bioInput = document.getElementById("bio");
const avatarInput = document.getElementById("avatarInput");
const avatarPreview = document.getElementById("avatarPreview");
const linksContainer = document.getElementById("linksContainer");

/* =========================
   THEME TOGGLE
========================= */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* =========================
   MODAL
========================= */
function showModal(msg, onClose=null){
  const modal = document.getElementById("modal");
  document.getElementById("modalMessage").innerText = msg;
  modal.style.display = "flex";

  const okBtn = modal.querySelector("button");
  const closeHandler = () => {
    closeModal();
    if(onClose) onClose();
    okBtn.removeEventListener("click", closeHandler);
  };
  okBtn.addEventListener("click", closeHandler);
}
function closeModal(){ document.getElementById("modal").style.display = "none"; }
document.getElementById("modal").onclick = e => {
  if(e.target.id === "modal") closeModal();
};

/* =========================
   AVATAR PREVIEW
========================= */
avatarInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;
  if(!file.type.startsWith("image/")) return showModal("Only image files allowed");
  if(file.size > 2*1024*1024) return showModal("Image must be less than 2MB");

  const reader = new FileReader();
  reader.onload = () => avatarPreview.src = reader.result;
  reader.readAsDataURL(file);
};

/* =========================
   LINKS (DYNAMIC)
========================= */
document.getElementById("addLinkBtn").onclick = () => addLinkInput();
function addLinkInput(value=""){
  const div = document.createElement("div");
  div.className = "link-item";
  div.innerHTML = `
    <input type="url" class="linkInput" placeholder="https://example.com" value="${value}">
    <button type="button" onclick="this.parentElement.remove()">Remove</button>
  `;
  linksContainer.appendChild(div);
}
function getLinksArray(){
  return Array.from(document.querySelectorAll(".linkInput"))
    .map(i => i.value.trim())
    .filter(v => v.length > 0);
}

/* =========================
   LOADING HANDLER
========================= */
function setLoading(isLoading){
  const btn = document.getElementById("saveProfileBtn");
  document.getElementById("saveProfileText").classList.toggle("hidden", isLoading);
  document.getElementById("saveProfileLoader").classList.toggle("hidden", !isLoading);
  btn.disabled = isLoading;
}

/* =========================
   LOAD USER PROFILE
========================= */
async function loadUserProfile(){
  const token = localStorage.getItem("token");

  if(!token){
    showModal("Session expired. Please login.", ()=> window.location.href="login.html");
    return;
  }

  // Prefill from registration (if exists)
  const regEmail = localStorage.getItem("userEmail");
  const regPhone = localStorage.getItem("userPhone");
  if(regEmail) emailInput.value = regEmail;
  if(regPhone) phoneInput.value = regPhone;

  // Fetch full user info from backend
  try {
    const res = await fetch(`${API}/me`, { headers: { "Authorization": `Bearer ${token}` } });
    if(!res.ok) return;

    const { user } = await res.json();

    phoneInput.value = user.phone || phoneInput.value;
    emailInput.value = user.email || emailInput.value;
    usernameInput.value = user.username || "";
    bioInput.value = user.bio || "";
    avatarPreview.src = user.avatarUrl || "default-avatar.png";
    document.getElementById("lastSeenToggle").checked = user.lastSeenVisible !== false;

    linksContainer.innerHTML = "";
    if(user.links) user.links.forEach(link => addLinkInput(link));

  } catch(err){
    console.error(err);
  }
}

/* =========================
   SAVE PROFILE
========================= */
document.getElementById("saveProfileBtn").onclick = async () => {
  const phone = phoneInput.value.trim();
  const email = emailInput.value.trim();
  const username = usernameInput.value.trim();
  const bio = bioInput.value.trim();
  const avatarFile = avatarInput.files[0];
  const lastSeenVisible = document.getElementById("lastSeenToggle").checked;
  const links = getLinksArray();

  if(!phone || !email || !username){
    return showModal("Phone, Email, and Username are required.");
  }
  if(!/^\d{10,15}$/.test(phone)) return showModal("Invalid phone number");
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showModal("Invalid email format");
  if(username.length < 3) return showModal("Username must be at least 3 characters");
  if(bio.length > 150) return showModal("Bio too long");

  setLoading(true);

  const token = localStorage.getItem("token");
  if(!token){
    setLoading(false);
    return showModal("Session expired. Please login.", ()=> window.location.href="login.html");
  }

  try {
    const formData = new FormData();
    formData.append("phone", phone);
    formData.append("email", email);
    formData.append("username", username);
    formData.append("bio", bio);
    formData.append("lastSeenVisible", lastSeenVisible);
    links.forEach(l => formData.append("links[]", l));
    if(avatarFile) formData.append("avatar", avatarFile);

    const res = await fetch(`${API}/update-profile`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}` },
      body: formData
    });

    const data = await res.json();
    setLoading(false);

    if(res.status === 429){
      return showModal("Too many attempts. Redirecting...", ()=>{
        localStorage.clear();
        window.location.href="login.html";
      });
    }
    if(!res.ok) return showModal(data.message || "Failed to save profile");

    // Replace old token with new token
    if(data.newToken){
      localStorage.removeItem("token");
      localStorage.setItem("token", data.newToken);
    }

    // Clear temporary registration data
    localStorage.removeItem("userEmail");
    localStorage.removeItem("userPhone");

    // Success → redirect to homepage
    showModal("Profile updated successfully!", ()=> window.location.href="home.html");

  } catch(err){
    setLoading(false);
    console.error(err);
    showModal("Network error");
  }
};

/* =========================
   INIT
========================= */
window.onload = loadUserProfile;
</script>
</body>
</html>
