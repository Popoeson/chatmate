<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Profile | ChatMate</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* =========================
   THEME VARIABLES
========================= */
:root {
  --bg: #F5F6F7;
  --surface: #7B7F85;
  --accent: #2B2E33;
  --text: #2B2E33;
}

body.dark {
  --bg: #2B2E33;
  --surface: #7B7F85;
  --accent: #F5F6F7;
  --text: #F5F6F7;
}

/* =========================
   BASE STYLES
========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.logo { font-weight: bold; font-size: 20px; }
.theme-toggle { cursor: pointer; font-size: 20px; }

.container {
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  width: 400px;
  padding: 25px;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card h2 { margin-bottom: 20px; }

input {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: left;
}

textarea {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  resize: none;
  text-align: left;
}

button {
  width: 95%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
  font-weight: bold;
  position: relative;
}

/* =========================
   AVATAR & TOGGLE
========================= */
#avatarPreview {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
  border: 2px solid var(--accent);
}

.toggle-switch {
  display: inline-block;
  position: relative;
  width: 50px;
  height: 24px;
  margin-left: 10px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #ccc;
  border-radius: 24px;
  top: 0; left: 0; right: 0; bottom: 0;
  transition: 0.4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px; width: 18px;
  left: 3px; bottom: 3px;
  background-color: white;
  border-radius: 50%;
  transition: 0.4s;
}

input:checked + .slider {
  background-color: var(--accent);
}

input:checked + .slider:before {
  transform: translateX(26px);
}

/* =========================
   LINKS
========================= */
.link-item {
  display: flex;
  gap: 5px;
  margin-bottom: 5px;
}

.link-item input {
  flex: 1;
}

.link-item button {
  width: auto;
  padding: 6px 10px;
  margin: 0;
}

#addLinkBtn {
  width: auto;
  padding: 10px 15px;
  margin-top: 5px;
}

/* =========================
   LOADER
========================= */
.loader {
  display: none;
  gap: 5px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader span {
  width: 6px;
  height: 6px;
  background: var(--bg);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   MODAL
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  padding:20px;
  border-radius:12px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  text-align:center;
}

input[readonly] {
  opacity: 0.7;
  cursor: not-allowed;
}

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">ChatMate</div>
  <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<!-- MAIN -->
<div class="container">
  <div class="card">
    <h2>Complete Your Profile</h2>

    <!-- AVATAR -->
    <img id="avatarPreview" src="default-avatar.png" alt="Avatar Preview">
    <input type="file" id="avatarInput" accept="image/*">

    <!-- PHONE -->
    <input type="text" id="phone" placeholder="Phone Number" readonly>
    
     <!-- EMAIL -->
    <input type="mail" id="email" placeholder="example@mail.com" readonly>

    <!-- USERNAME -->
    <input type="text" id="username" placeholder="Username">

    <!-- ABOUT / BIO -->
    <textarea id="bio" rows="3" placeholder="About / Bio (max 150 chars)" maxlength="150"></textarea>

    <!-- LAST SEEN TOGGLE -->
    <div style="margin:10px 0; display:flex; align-items:center;">
      <span>Show Last Seen</span>
      <label class="toggle-switch">
        <input type="checkbox" id="lastSeenToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- LINKS -->
    <div id="linksContainer"></div>
    <button type="button" id="addLinkBtn">Add Link</button>

    <!-- SAVE BUTTON -->
    <button id="saveProfileBtn">
      <span id="saveProfileText">Save Profile</span>
      <div id="saveProfileLoader" class="loader hidden">
        <span></span><span></span><span></span>
      </div>
    </button>
  </div>
</div>


<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* =========================
   ELEMENT REFERENCES
========================= */
const phoneInput = document.getElementById("phone");
const emailInput = document.getElementById("email");
const usernameInput = document.getElementById("username");
const bioInput = document.getElementById("bio");
const avatarInput = document.getElementById("avatarInput");
const avatarPreview = document.getElementById("avatarPreview");
const linksContainer = document.getElementById("linksContainer");

/* =========================
   THEME TOGGLE
========================= */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* =========================
   MODAL
========================= */
function showModal(msg){
  document.getElementById("modalMessage").innerText = msg;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

document.getElementById("modal").onclick = (e)=>{
  if(e.target.id === "modal") closeModal();
};

/* =========================
   AVATAR PREVIEW + VALIDATION
========================= */
avatarInput.onchange = (e)=>{
  const file = e.target.files[0];

  if(file){
    if(!file.type.startsWith("image/")){
      showModal("Only image files allowed");
      avatarInput.value = "";
      return;
    }

    if(file.size > 2 * 1024 * 1024){
      showModal("Image must be less than 2MB");
      avatarInput.value = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      avatarPreview.src = reader.result;
    };
    reader.readAsDataURL(file);
  }
};

/* =========================
   LINKS (DYNAMIC)
========================= */
document.getElementById("addLinkBtn").onclick = ()=>{
  addLinkInput("");
};

function addLinkInput(value=""){
  const div = document.createElement("div");
  div.className = "link-item";

  div.innerHTML = `
    <input type="url" class="linkInput" placeholder="https://example.com" value="${value}">
    <button type="button" onclick="this.parentElement.remove()">Remove</button>
  `;

  linksContainer.appendChild(div);
}

function getLinksArray(){
  return Array.from(document.querySelectorAll(".linkInput"))
    .map(input => input.value.trim())
    .filter(url => url.length > 0);
}

/* =========================
   LOADING HANDLER
========================= */
function setLoading(isLoading){
  const btn = document.getElementById("saveProfileBtn");
  const text = document.getElementById("saveProfileText");
  const loader = document.getElementById("saveProfileLoader");

  text.classList.toggle("hidden", isLoading);
  loader.classList.toggle("hidden", !isLoading);
  btn.disabled = isLoading;
}

/* =========================
   LOAD USER PROFILE (JWT)
========================= */
async function loadUserProfile(){
  try{
    const token = localStorage.getItem("token");

    if(!token){
      showModal("Session expired. Please login again.");
      return;
    }

    const res = await fetch(`${API}/me`, {
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });

    if(!res.ok){
      showModal("Failed to load profile");
      return;
    }

    const data = await res.json();
    const user = data.user;

    // PREFILL
    phoneInput.value = user.phone || "";
    emailInput.value = user.email || "";
    usernameInput.value = user.username || "";
    bioInput.value = user.bio || "";

    // LOCK FIELDS
    phoneInput.readOnly = true;
    emailInput.readOnly = true;

    // AVATAR
    avatarPreview.src = user.avatarUrl || "default-avatar.png";

    // LAST SEEN
    document.getElementById("lastSeenToggle").checked =
      user.lastSeenVisible !== false;

    // LINKS
    linksContainer.innerHTML = "";
    if(user.links && user.links.length > 0){
      user.links.forEach(link => addLinkInput(link));
    }

  }catch(err){
    console.error(err);
    showModal("Error loading profile");
  }
}

/* =========================
   SAVE PROFILE
========================= */
document.getElementById("saveProfileBtn").onclick = async ()=>{
  const phone = phoneInput.value.trim();
  const email = emailInput.value.trim();
  const username = usernameInput.value.trim();
  const bio = bioInput.value.trim();
  const avatarFile = avatarInput.files[0];
  const lastSeenVisible = document.getElementById("lastSeenToggle").checked;
  const links = getLinksArray();

  /* VALIDATION */
  if(!phone || !email || !username){
    showModal("Phone, Email, and Username are required.");
    return;
  }

  if(!/^\d{10,15}$/.test(phone)){
    showModal("Invalid phone number");
    return;
  }

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showModal("Invalid email format");
    return;
  }

  if(username.length < 3){
    showModal("Username must be at least 3 characters");
    return;
  }

  if(bio.length > 150){
    showModal("Bio too long");
    return;
  }

  setLoading(true);

  try{
    const token = localStorage.getItem("token");

    if(!token){
      showModal("Session expired. Please login again.");
      setLoading(false);
      return;
    }

    const formData = new FormData();
    formData.append("phone", phone);
    formData.append("email", email);
    formData.append("username", username);
    formData.append("bio", bio);
    formData.append("lastSeenVisible", lastSeenVisible);

    links.forEach(link => formData.append("links[]", link));

    if(avatarFile){
      formData.append("avatar", avatarFile);
    }

    const res = await fetch(`${API}/update-profile`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`
      },
      body: formData
    });

    const data = await res.json();
    setLoading(false);

    if(!res.ok){
      showModal(data.message || "Failed to save profile");
      return;
    }

    showModal("Profile updated successfully!");

    setTimeout(()=>{
      window.location.href = "home.html";
    },1500);

  }catch(err){
    console.error(err);
    setLoading(false);
    showModal("Network error");
  }
};

/* =========================
   INIT
========================= */
window.onload = loadUserProfile;
</script>
</body>
</html>
