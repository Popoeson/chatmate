<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatMate - Register</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   THEME VARIABLES
========================= */
:root {
  --bg: #F5F6F7;
  --surface: #7B7F85;
  --accent: #2B2E33;
  --text: #2B2E33;
}

body.dark {
  --bg: #2B2E33;
  --surface: #7B7F85;
  --accent: #F5F6F7;
  --text: #F5F6F7;
}

/* ========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* ========================= */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
}

/* ========================= */
.container {
  height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ========================= */
.card {
  width: 360px;
  padding: 25px;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  text-align: center;
}

/* ========================= */
input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* ========================= */
button {
  width: 95%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
  font-weight: bold;
  position: relative;
}

/* =========================
   LOADER
========================= */
.loader {
  display: inline-flex;
  gap: 5px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader span {
  width: 6px;
  height: 6px;
  background: var(--bg);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   MODAL
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  padding:20px;
  border-radius:12px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  text-align:center;
}

/* ========================= */
.login-link {
  margin-top:15px;
}

.login-link a {
  color: var(--accent);
  font-weight:bold;
  text-decoration:none;
}

/* ========================= */
.hidden {
  display:none;
}

</style>
</head>

<body>

<header>
  <div>ChatMate</div>
  <div id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<div class="container">

<div class="card">

<h2>Welcome to ChatMate!</h2>

<!-- FORM -->
<div id="formState">

<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input type="password" id="password" placeholder="Password">

<button id="signupBtn" onclick="submitForm()">
  <span id="btnText">Sign Up</span>
  <div id="loader" class="loader hidden">
    <span></span><span></span><span></span>
  </div>
</button>

<div class="login-link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

<!-- OTP STATE -->
<div id="otpState" class="hidden">

  <h3>Verify Email</h3>

  <input id="otp" type="text" placeholder="Enter 6-digit OTP" maxlength="6">

  <button id="verifyBtn" onclick="verifyOTP()">
    <span id="verifyText">Verify</span>
    <div id="verifyLoader" class="loader hidden">
      <span></span><span></span><span></span>
    </div>
  </button>

  <button id="resendBtn" onclick="resendOTP()">
    <span id="resendText">Resend OTP</span>
    <div id="resendLoader" class="loader hidden">
      <span></span><span></span><span></span>
    </div>
  </button>

  <div style="margin-top:10px;">
    <a href="#" onclick="updateEmail()">Wrong email? Update email.</a>
  </div>

</div>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* =========================
   ELEMENT REFERENCES
========================= */
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const passwordInput = document.getElementById("password");
const otpInput = document.getElementById("otp");

const verifyBtn = document.getElementById("verifyBtn");
const verifyText = document.getElementById("verifyText");
const verifyLoader = document.getElementById("verifyLoader");

const resendBtn = document.getElementById("resendBtn");
const resendText = document.getElementById("resendText");
const resendLoader = document.getElementById("resendLoader");

const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");

/* =========================
   THEME TOGGLE
========================= */
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* =========================
   MODAL FUNCTIONS
========================= */
function showModal(msg){
  document.getElementById("modalMessage").innerText = msg;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

document.getElementById("modal").onclick = (e)=>{
  if(e.target.id === "modal") closeModal();
};

/* =========================
   LOADING HELPERS
========================= */
function setLoading(state){
  document.getElementById("btnText").classList.toggle("hidden", state);
  document.getElementById("loader").classList.toggle("hidden", !state);
  document.getElementById("signupBtn").disabled = state;
}

function setVerifyLoading(isLoading){
  verifyText.classList.toggle("hidden", isLoading);
  verifyLoader.classList.toggle("hidden", !isLoading);
  verifyBtn.disabled = isLoading;
}

function setResendLoading(isLoading){
  resendText.classList.toggle("hidden", isLoading);
  resendLoader.classList.toggle("hidden", !isLoading);
  resendBtn.disabled = isLoading;
}

/* =========================
   STATE SWITCHING
========================= */
function showOTPState(){
  document.getElementById("formState").classList.add("hidden");
  document.getElementById("otpState").classList.remove("hidden");
  localStorage.setItem("registerState", "otp");
}

function showFormState(){
  document.getElementById("formState").classList.remove("hidden");
  document.getElementById("otpState").classList.add("hidden");
  localStorage.setItem("registerState", "form");
}

/* =========================
   PAGE LOAD STATE
========================= */
window.onload = ()=>{
  if(localStorage.getItem("registerState")==="otp"){
    showOTPState();
  }
};

/* =========================
   REGISTER FORM
========================= */
async function submitForm(){
  const email = emailInput.value.trim();
  const phone = phoneInput.value.trim();
  const password = passwordInput.value;

  if(!email || !phone || !password){
    showModal("Fill all fields");
    return;
  }

  setLoading(true);

  try{
    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({email, phone, password})
    });

    const data = await res.json();
    setLoading(false);

    if(!res.ok){
      showModal(data.message);
      return;
    }

    localStorage.setItem("userId", data.userId);
    showModal("OTP sent!");

    setTimeout(()=>{
      closeModal();
      showOTPState();
    },1500);

  }catch(err){
    console.error(err);
    setLoading(false);
    showModal("Network error");
  }
}

/* =========================
   VERIFY OTP
========================= */
async function verifyOTP(){
  const otp = otpInput.value.trim();
  const userId = localStorage.getItem("userId");

  if(!otp) return showModal("Enter OTP");
  if(!/^\d{6}$/.test(otp)) return showModal("OTP must be 6 digits");

  setVerifyLoading(true);

  try{
    const res = await fetch(`${API}/verify-otp`,{
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ userId, otp })
    });

    const data = await res.json();
    setVerifyLoading(false);

    if(!res.ok) return showModal(data.message);

    localStorage.clear();
    showModal("Verified successfully!");

    setTimeout(()=> window.location.href="profile.html", 1500);

  }catch(err){
    console.error(err);
    setVerifyLoading(false);
    showModal("Network error");
  }
}

/* =========================
   RESEND OTP (RATE-LIMIT)
========================= */
let resendCooldown = false;

async function resendOTP(){
  if(resendCooldown) return showModal("Wait before resending OTP");

  const userId = localStorage.getItem("userId");
  if(!userId) return showModal("No user session found");

  resendCooldown = true;
  setResendLoading(true);

  try{
    const res = await fetch(`${API}/resend-otp`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ userId })
    });

    const data = await res.json();
    setResendLoading(false);

    if(!res.ok){
      resendCooldown = false;
      return showModal(data.message);
    }

    showModal("OTP resent successfully!");
    setTimeout(()=> resendCooldown=false, 60000);

  }catch(err){
    console.error(err);
    setResendLoading(false);
    resendCooldown = false;
    showModal("Network error");
  }
}

/* =========================
   UPDATE EMAIL FLOW
========================= */
function updateEmail(){
  otpInput.value = "";
  showFormState();
  localStorage.removeItem("userId");
  localStorage.removeItem("registerState");
}
</script>
</body>
</html>
