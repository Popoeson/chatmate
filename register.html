<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | ChatMate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    
/* =========================
   THEME VARIABLES
========================= */
:root {
  --bg: #F8F7F4;
  --text: #1C1C1E;
  --input-border: #ccc;
  --btn-bg: #1C1C1E;
  --btn-text: #fff;
}

body.dark {
  --bg: #1C1C1E;
  --text: #fff;
  --input-bg: #2C2C2E; /* slightly darker for inputs */
  --btn-bg: #fff;
  --btn-text: #1C1C1E;
}

/* =========================
   BODY
========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* =========================
   HEADER
========================= */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

#themeToggle {
  cursor: pointer;
  font-size: 18px;
}

/* =========================
   CONTAINER & CARD
========================= */
.container {
  height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  padding: 30px;
  border-radius: 24px;
  text-align: center;
  transition: 0.3s;
  margin: 0 auto;
  background: var(--bg); /* light mode */
  box-shadow: 0 0 0 transparent; /* no shadow in light */
}

/* DARK MODE CARD - subtle lift with inset shadow */
body.dark .card {
  background: #1C1C1E; /* same as page */
  box-shadow:
    inset 0 0 15px rgba(255,255,255,0.05), /* subtle inner glow */
    0 15px 40px rgba(0,0,0,0.5);          /* floating effect */
}

/* =========================
   TITLE
========================= */
h2 {
  font-size: 30px;
  margin-bottom: 40px;
}

/* =========================
   INPUTS
========================= */
.input-group,
.password-wrap {
  width: 100%;
  max-width: 320px;
  margin: 0 auto 25px;
  position: relative;
  display: block;
  box-sizing: border-box;
}

/* DARK MODE INPUTS - underlined like light mode */
body.dark input {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1.5px solid #555; /* subtle underline */
  background: transparent;
  color: #fff;
  text-align: left;
  display: block;
  box-sizing: border-box;
}

/* LIGHT MODE INPUTS */
body:not(.dark) input {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1.5px solid var(--input-border);
  background: transparent;
  color: var(--text);
  text-align: left;
  display: block;
  box-sizing: border-box;
}

/* PASSWORD ICON */
.password-wrap i {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text);
  opacity: 0.7;
}

.password-wrap i:hover {
  opacity: 1;
}

input:focus { outline: none; }

/* =========================
   BUTTONS (GLASS EFFECT)
========================= */
button {
  width: 100%;
  height: 30px;
  border-radius: 999px;
  border: none;
  margin-top: 40px;
  font-weight: 600;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  position: relative;
  backdrop-filter: blur(20px);          /* glass effect */
  -webkit-backdrop-filter: blur(20px);  /* iOS Safari */
}

/* =========================
   LOADER
========================= */
.loader {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader.active {
  display: inline-flex;
}

.loader span {
  width: 6px;
  height: 6px;
  margin: 0 2px;
  background: var(--btn-text);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   FOOTER LINK
========================= */
.login-link {
  margin-top: 40px;
  font-size: 14px;
}

.login-link a {
  font-weight: bold;
  text-decoration: none;
  color: var(--text);
}

/* =========================
   MODAL (GLASS EFFECT)
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  width: 85%;
  max-width: 300px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08); /* frosted glass look */
}

body:not(.dark) .modal-content {
  background: #fff; /* light mode stays white */
}

.modal-content button {
  margin-top: 20px;
  height: 45px;
  border-radius: 999px;
}

/* =========================
   HIDDEN CLASS
========================= */
.hidden { display: none; }


</style>
</head>

<body>

<header>
  <div><strong>ChatMate</strong></div>
  <div id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<div class="container">
  <div class="card">

    <h2>Register</h2>

    <!-- FORM STATE -->
    <div id="formState">
      <input id="email" type="email" placeholder="Email">
      <input id="phone" type="text" placeholder="Phone">
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Password">
        <i id="togglePassword" class="fa-solid fa-eye"></i>
      </div>

      <button id="signupBtn" onclick="submitForm()">
        <span id="btnText">Sign Up</span>
        <div id="loader" class="loader">
          <span></span><span></span><span></span>
        </div>
      </button>

      <div class="login-link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>

    <!-- OTP STATE -->
    <div id="otpState" class="hidden">
      <h3>Verify Email</h3>
      <input id="otp" type="text" placeholder="Enter 6-digit OTP" maxlength="6">

      <button id="verifyBtn" onclick="verifyOTP()">
        <span id="verifyText">Verify</span>
        <div id="verifyLoader" class="loader">
          <span></span><span></span><span></span>
        </div>
      </button>

      <button id="resendBtn" onclick="resendOTP()">
        <span id="resendText">Resend OTP</span>
        <div id="resendLoader" class="loader">
          <span></span><span></span><span></span>
        </div>
      </button>

      <div style="margin-top:10px;">
        <a href="#" onclick="updateEmail()">Wrong email? Update email.</a>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* THEME */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* PASSWORD TOGGLE */
const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");
togglePassword.onclick = () => {
  const hidden = passwordInput.type === "password";
  passwordInput.type = hidden ? "text" : "password";
  togglePassword.classList.toggle("fa-eye");
  togglePassword.classList.toggle("fa-eye-slash");
};

/* MODAL */
function showModal(msg){
  document.getElementById("modalMessage").innerText = msg;
  document.getElementById("modal").style.display = "flex";
}
function closeModal(){ document.getElementById("modal").style.display = "none"; }

/* LOADING HELPERS */
function setLoading(state){
  document.getElementById("btnText").classList.toggle("hidden", state);
  document.getElementById("loader").classList.toggle("active", state);
  document.getElementById("signupBtn").disabled = state;
}

function setVerifyLoading(isLoading){
  verifyText.classList.toggle("hidden", isLoading);
  document.getElementById("verifyLoader").classList.toggle("active", isLoading);
  document.getElementById("verifyBtn").disabled = isLoading;
}

function setResendLoading(isLoading){
  resendText.classList.toggle("hidden", isLoading);
  document.getElementById("resendLoader").classList.toggle("active", isLoading);
  document.getElementById("resendBtn").disabled = isLoading;
}

/* STATE SWITCHING */
function showOTPState(){
  document.getElementById("formState").classList.add("hidden");
  document.getElementById("otpState").classList.remove("hidden");
  localStorage.setItem("registerState","otp");
}

function showFormState(){
  document.getElementById("formState").classList.remove("hidden");
  document.getElementById("otpState").classList.add("hidden");
  localStorage.setItem("registerState","form");
}

/* PAGE LOAD */
window.onload = ()=>{
  if(localStorage.getItem("registerState")==="otp"){
    showOTPState();
  }
};

/* REGISTER FORM */
async function submitForm(){
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;

  if(!email||!phone||!password){ showModal("Fill all fields"); return; }

  setLoading(true);
  try{
    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({email,phone,password})
    });
    const data = await res.json();
    setLoading(false);

    if(!res.ok){ showModal(data.message); return; }

    localStorage.setItem("userId", data.userId);
    showModal("OTP sent!");
    setTimeout(()=>{ closeModal(); showOTPState(); },1500);
  }catch(err){ setLoading(false); showModal("Network error"); console.error(err); }
}

/* VERIFY OTP */
async function verifyOTP(){
  const otp = document.getElementById("otp").value.trim();
  const userId = localStorage.getItem("userId");

  if(!otp){ showModal("Enter OTP"); return; }
  if(!/^\d{6}$/.test(otp)){ showModal("OTP must be 6 digits"); return; }

  setVerifyLoading(true);
  try{
    const res = await fetch(`${API}/verify-otp`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({userId,otp})
    });
    const data = await res.json();
    setVerifyLoading(false);
    if(!res.ok){ showModal(data.message); return; }

    localStorage.setItem("token", data.token);
    localStorage.setItem("userEmail", data.user.email);
    localStorage.setItem("userPhone", data.user.phone);
    localStorage.removeItem("userId");
    localStorage.removeItem("registerState");

    showModal("Verified successfully!");
    setTimeout(()=>{ window.location.href="profile.html"; },1500);
  }catch(err){ setVerifyLoading(false); showModal("Network error"); console.error(err); }
}

/* RESEND OTP */
let resendCooldown=false;
async function resendOTP(){
  if(resendCooldown){ showModal("Wait before resending OTP"); return; }
  const userId = localStorage.getItem("userId");
  if(!userId){ showModal("No user session found"); return; }

  resendCooldown=true;
  setResendLoading(true);

  try{
    const res = await fetch(`${API}/resend-otp`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({userId})
    });
    const data = await res.json();
    setResendLoading(false);
    if(!res.ok){ resendCooldown=false; showModal(data.message); return; }

    showModal("OTP resent successfully!");
    setTimeout(()=>resendCooldown=false,60000);
  }catch(err){ setResendLoading(false); resendCooldown=false; showModal("Network error"); console.error(err); }
}

/* UPDATE EMAIL */
function updateEmail(){
  document.getElementById("otp").value="";
  showFormState();
  localStorage.removeItem("userId");
  localStorage.removeItem("registerState");
}
</script>

</body>
</html>
