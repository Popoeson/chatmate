<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatMate - Register</title>

<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
/* =========================
   THEME VARIABLES (60:30:10)
========================= */

:root {
  --bg: #F5F6F7;
  --surface: #7B7F85;
  --accent: #2B2E33;
  --text: #2B2E33;
}

body.dark {
  --bg: #2B2E33;
  --surface: #7B7F85;
  --accent: #F5F6F7;
  --text: #F5F6F7;
}

/* =========================
   BASE STYLES
========================= */

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* =========================
   HEADER
========================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.theme-toggle {
  cursor: pointer;
  font-size: 20px;
}

/* =========================
   CENTER CONTAINER
========================= */

.container {
  height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* =========================
   CARD (GLASSMORPHISM)
========================= */

.card {
  width: 360px;
  padding: 25px;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* =========================
   FORM
========================= */

input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: center;
}

button {
  width: 95%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
  font-weight: bold;
}

/* =========================
   LOADING DOTS
========================= */

.loader {
  display: inline-flex;
  gap: 5px;
  justify-content: center;
  align-items: center;
}

.loader span {
  width: 6px;
  height: 6px;
  background: var(--bg);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2) {
  animation-delay: 0.2s;
}

.loader span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* =========================
   MODAL
========================= */

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  width: 300px;
  padding: 20px;
  border-radius: 12px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  text-align: center;
}

.modal button {
  margin-top: 10px;
}

/* =========================
   LOGIN LINK
========================= */

.login-link {
  margin-top: 15px;
  font-size: 14px;
}

.login-link a {
  color: var(--accent);
  text-decoration: none;
  font-weight: bold;
}

/* =========================
   HIDDEN STATE
========================= */

.hidden {
  display: none;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">ChatMate</div>
  <div class="theme-toggle" id="themeToggle">
    <i class="fa-solid fa-moon"></i>
  </div>
</header>

<!-- MAIN -->
<div class="container">

  <div class="card">

    <!-- TITLE -->
    <h2>Welcome to ChatMate!</h2>

    <!-- ================= FORM STATE ================= -->
    <div id="formState">

      <input type="email" id="email" placeholder="Email">
      <input type="text" id="phone" placeholder="Phone Number">
      <input type="password" id="password" placeholder="Password">

      <button id="signupBtn" onclick="submitForm()">
  <span id="btnText">Sign Up</span>
  <div id="loader" class="loader hidden">
    <span></span><span></span><span></span>
  </div>
</button>
    </div>

<!-- ===== LOGIN LINK =========== -->
<div class="login-link">
  Already have an account? <a href="login.html">Login</a>
</div>

    <!-- ================= OTP STATE ================= -->
    <div id="otpState" class="hidden">

      <h3>Verify Your Email</h3>

      <input type="text" id="otp" placeholder="Enter OTP">

      <button onclick="verifyOTP()">Verify</button>
      <button onclick="resendOTP()">Resend OTP</button>

    </div>

  </div>

</div>

<!-- ==== SHOW MODAL ====== -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>

const API = "https://chatmate-kbwz.onrender.com/api/auth";

/* =========================
   THEME TOGGLE
========================= */

const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");

toggle.onclick = () => {
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    icon.classList.remove("fa-moon");
    icon.classList.add("fa-sun");
  } else {
    icon.classList.remove("fa-sun");
    icon.classList.add("fa-moon");
  }
};

/* =========================
   STATE SWITCHING
========================= */

function showOTPState(){
  document.getElementById("formState").classList.add("hidden");
  document.getElementById("otpState").classList.remove("hidden");

  localStorage.setItem("registerState", "otp");
}

function showFormState(){
  document.getElementById("formState").classList.remove("hidden");
  document.getElementById("otpState").classList.add("hidden");

  localStorage.setItem("registerState", "form");
}

/* ============== SHOW MODAL ===========*/
function showModal(message){
  document.getElementById("modalMessage").innerText = message;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* =========================
   LOAD STATE
========================= */

window.onload = () => {
  const state = localStorage.getItem("registerState");

  if(state === "otp"){
    showOTPState();
  }
};

/*========= LOADING STATUS =========*/
function setLoading(isLoading){
  const btnText = document.getElementById("btnText");
  const loader = document.getElementById("loader");
  const btn = document.getElementById("signupBtn");

  if(isLoading){
    btnText.classList.add("hidden");
    loader.classList.remove("hidden");
    btn.disabled = true;
  } else {
    btnText.classList.remove("hidden");
    loader.classList.add("hidden");
    btn.disabled = false;
  }
}

/* =========================
   FORM SUBMIT (REGISTER)
========================= */

async function submitForm(){

  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;

  if(!email || !phone || !password){
    showModal("Fill all fields");
    return;
  }

  setLoading(true);

  try{
    const res = await fetch(`${API}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, phone, password })
    });

    const data = await res.json();

    setLoading(false);

    if(!res.ok){
      showModal(data.message || "Registration failed");
      return;
    }

    localStorage.setItem("userId", data.userId);

    showModal("OTP sent to your email");
    showOTPState();

  }catch(err){
    setLoading(false);
    console.error(err);
    showModal("Network error");
  }
}

/* =========================
   VERIFY OTP
========================= */

async function verifyOTP(){

  const otp = document.getElementById("otp").value;
  const userId = localStorage.getItem("userId");

  if(!otp){
    showModal("Enter OTP");
    return;
  }

  try{
    const res = await fetch(`${API}/verify-otp`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId, otp })
    });

    const data = await res.json();

    if(!res.ok){
      showModal(data.message || "Invalid OTP");
      return;
    }

    // Clear state
    localStorage.removeItem("registerState");
    localStorage.removeItem("userId");

    showModal("Verified successfully!");
    window.location.href = "profile.html";

  }catch(err){
    console.error(err);
    showModal("Network error");
  }
}

/* =========================
   RESEND OTP
========================= */

async function resendOTP(){

  const userId = localStorage.getItem("userId");

  if(!userId){
    showModal("No user session found");
    return;
  }

  try{
    const res = await fetch(`${API}/resend-otp`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId })
    });

    const data = await res.json();

    if(!res.ok){
      showModal(data.message || "Failed to resend OTP");
      return;
    }

    showModal("OTP resent successfully!");

  }catch(err){
    console.error(err);
    showModal("Network error");
  }
}

</script>
</body>
</html>
