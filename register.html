<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatMate - Register</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   THEME VARIABLES
========================= */
:root {
  --bg: #F5F6F7;
  --surface: #7B7F85;
  --accent: #2B2E33;
  --text: #2B2E33;
}

body.dark {
  --bg: #2B2E33;
  --surface: #7B7F85;
  --accent: #F5F6F7;
  --text: #F5F6F7;
}

/* ========================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* ========================= */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
}

/* ========================= */
.container {
  height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ========================= */
.card {
  width: 360px;
  padding: 25px;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  text-align: center;
}

/* ========================= */
input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* ========================= */
button {
  width: 95%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
  font-weight: bold;
  position: relative;
}

/* =========================
   LOADER
========================= */
.loader {
  display: inline-flex;
  gap: 5px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.loader span {
  width: 6px;
  height: 6px;
  background: var(--bg);
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){ animation-delay: 0.2s; }
.loader span:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100%{ transform: scale(0); }
  40%{ transform: scale(1); }
}

/* =========================
   MODAL
========================= */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  padding:20px;
  border-radius:12px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  text-align:center;
}

/* ========================= */
.login-link {
  margin-top:15px;
}

.login-link a {
  color: var(--accent);
  font-weight:bold;
  text-decoration:none;
}

/* ========================= */
.hidden {
  display:none;
}

</style>
</head>

<body>

<header>
  <div>ChatMate</div>
  <div id="themeToggle"><i class="fa-solid fa-moon"></i></div>
</header>

<div class="container">

<div class="card">

<h2>Welcome to ChatMate!</h2>

<!-- FORM -->
<div id="formState">

<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input type="password" id="password" placeholder="Password">

<button id="signupBtn" onclick="submitForm()">
  <span id="btnText">Sign Up</span>
  <div id="loader" class="loader hidden">
    <span></span><span></span><span></span>
  </div>
</button>

<div class="login-link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

<!-- OTP -->
<div id="otpState" class="hidden">

<h3>Verify Email</h3>

<input id="otp" type="number" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify</button>
<button onclick="resendOTP()">Resend OTP</button>

</div>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>

const API = "https://chatmate-kbwz.onrender.com/api/auth";

const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const passwordInput = document.getElementById("password");

/* THEME */
const toggle = document.getElementById("themeToggle");
const icon = toggle.querySelector("i");

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");
};

/* MODAL */
function showModal(msg){
  document.getElementById("modalMessage").innerText = msg;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

document.getElementById("modal").onclick = (e)=>{
  if(e.target.id === "modal") closeModal();
};

/* LOADING */
function setLoading(state){
  document.getElementById("btnText").classList.toggle("hidden", state);
  document.getElementById("loader").classList.toggle("hidden", !state);
  document.getElementById("signupBtn").disabled = state;
}

/* STATE */
function showOTPState(){
  document.getElementById("formState").classList.add("hidden");
  document.getElementById("otpState").classList.remove("hidden");
  localStorage.setItem("registerState","otp");
}

/* LOAD */
window.onload = ()=>{
  if(localStorage.getItem("registerState")==="otp"){
    showOTPState();
  }
};

/* REGISTER */
async function submitForm(){

  const email = emailInput.value;
  const phone = phoneInput.value;
  const password = passwordInput.value;

  if(!email || !phone || !password){
    showModal("Fill all fields");
    return;
  }

  setLoading(true);

  try{
    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({email,phone,password})
    });

    const data = await res.json();
    setLoading(false);

    if(!res.ok){
      showModal(data.message);
      return;
    }

    localStorage.setItem("userId", data.userId);

    showModal("OTP sent!");

    setTimeout(()=>{
      closeModal();
      showOTPState();
    },1500);

  }catch(err){
    setLoading(false);
    showModal("Network error");
  }
}

/* VERIFY */
async function verifyOTP(){

  const otp = document.getElementById("otp").value;
  const userId = localStorage.getItem("userId");

  if(!otp){
    showModal("Enter OTP");
    return;
  }

  try{
    const res = await fetch(`${API}/verify-otp`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({userId, otp})
    });

    const data = await res.json();

    if(!res.ok){
      showModal(data.message);
      return;
    }

    localStorage.clear();

    showModal("Verified!");

    setTimeout(()=>{
      window.location.href="profile.html";
    },1500);

  }catch{
    showModal("Network error");
  }
}

/* RESEND */
let cooldown=false;

async function resendOTP(){

  if(cooldown){
    showModal("Wait before resending");
    return;
  }

  cooldown=true;
  setTimeout(()=>cooldown=false,60000);

  const userId = localStorage.getItem("userId");

  try{
    const res = await fetch(`${API}/resend-otp`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({userId})
    });

    const data = await res.json();

    if(!res.ok){
      showModal(data.message);
      return;
    }

    showModal("OTP resent!");

  }catch{
    showModal("Network error");
  }
}

</script>

</body>
</html>
